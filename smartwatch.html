<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>A-LAS Watch</title>
    
    <!-- Se eliminó el script pesado de Tailwind CSS para evitar Crash de Memoria en el Reloj -->
    
    <!-- Font Awesome (Iconos) -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    
    <!-- FIREBASE COMPAT -->
    <script src="https://www.gstatic.com/firebasejs/10.13.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.13.1/firebase-auth-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.13.1/firebase-firestore-compat.js"></script>

    <style>
        /* =========================================================
           CSS NATIVO ULTRALIGERO (Reemplazo optimizado de Tailwind)
           ========================================================= */
        body { 
            font-family: system-ui, -apple-system, sans-serif; 
            background-color: #0f172a; 
            color: #ffffff;
            user-select: none; 
            margin: 0; padding: 0;
            width: 100vw; height: 100vh;
            overflow-y: auto; overflow-x: hidden;
        }
        
        .no-scrollbar::-webkit-scrollbar { display: none; }
        .no-scrollbar { -ms-overflow-style: none; scrollbar-width: none; }
        .hidden { display: none !important; }

        /* Layout Principal */
        #watch-face {
            width: 100%; min-height: 100%;
            display: flex; flex-direction: column;
            max-width: 400px; margin: 0 auto;
        }

        #content {
            padding: 25% 10% 35% 10%;
            display: flex; flex-direction: column;
            align-items: center; justify-content: center;
            gap: 12px; flex-grow: 1;
        }

        /* Utilidades de Texto y Color */
        .text-center { text-align: center; }
        .text-blue { color: #3b82f6; }
        .text-blue-light { color: #60a5fa; }
        .text-slate-light { color: #94a3b8; }
        .text-slate-dim { color: #64748b; }
        .text-red { color: #ef4444; }
        .text-green { color: #4ade80; }
        .text-amber { color: #fbbf24; }
        .text-pink { color: #ec4899; }
        .font-bold { font-weight: 700; }

        /* Botones y UI */
        .watch-title {
            font-size: 14px; color: #94a3b8;
            text-transform: uppercase; letter-spacing: 2px;
            margin-bottom: 8px; text-align: center; font-weight: 800;
        }

        .watch-btn {
            width: 100%;
            background-color: #1e293b;
            border: 2px solid #334155;
            border-radius: 999px;
            padding: 16px 20px;
            font-weight: bold; font-size: 16px; color: white;
            display: flex; align-items: center; justify-content: center; gap: 10px;
            transition: transform 0.1s, background-color 0.1s;
            box-sizing: border-box; cursor: pointer; outline: none;
        }
        .watch-btn:active {
            transform: scale(0.95);
            background-color: #3b82f6; border-color: #60a5fa;
        }
        
        .watch-btn-item {
            justify-content: space-between;
            padding-left: 24px; padding-right: 24px;
        }
        
        .watch-btn.btn-green {
            background-color: #16a34a; border-color: #22c55e;
            box-shadow: 0 4px 14px rgba(20, 83, 45, 0.5);
            padding-top: 16px; padding-bottom: 16px;
        }
        .watch-btn.btn-green:active { background-color: #15803d; border-color: #16a34a; }

        .item-name {
            font-size: 14px; flex: 1; text-align: left;
            overflow: hidden; text-overflow: ellipsis; white-space: nowrap;
        }
        
        .item-price {
            font-size: 12px; color: #4ade80; font-weight: 900;
            background-color: #0f172a; padding: 6px 12px;
            border-radius: 999px; border: 1px solid #334155;
            flex-shrink: 0;
        }

        /* Botón de restar */
        .btn-minus {
            width: 52px; background-color: #7f1d1d; border: 2px solid #ef4444; 
            border-radius: 26px; color: white; font-weight: bold; font-size: 18px; 
            display: flex; align-items: center; justify-content: center; 
            outline: none; flex-shrink: 0; transition: transform 0.1s;
        }
        .btn-minus:active { transform: scale(0.90); background-color: #991b1b; }

        .back-btn {
            width: 48px; height: 48px;
            background-color: #1e293b; border-radius: 50%;
            display: flex; align-items: center; justify-content: center;
            color: #cbd5e1; border: 1px solid #334155;
            margin-bottom: 16px; font-size: 18px; cursor: pointer; outline: none;
        }
        .back-btn:active { background-color: #334155; }

        .table-title { font-size: 30px; font-weight: 900; color: white; margin-top: 8px; text-align: center;}
        
        .table-subtitle {
            font-size: 11px; color: #94a3b8; text-transform: uppercase;
            letter-spacing: 2px; overflow: hidden; text-overflow: ellipsis;
            white-space: nowrap; width: 100%; padding: 0 16px; text-align: center;
            margin-bottom: 8px; box-sizing: border-box;
        }
        
        .table-total {
            font-size: 36px; font-weight: 900; color: #60a5fa;
            background-color: rgba(30, 41, 59, 0.5); padding: 12px 24px;
            border-radius: 24px; border: 1px solid #334155; margin-bottom: 24px;
            text-align: center;
        }

        .empty-state {
            font-size: 14px; color: #94a3b8; margin-top: 16px; text-align: center;
            background-color: rgba(30, 41, 59, 0.5); padding: 16px;
            border-radius: 16px; border: 1px solid #334155; width: 100%; box-sizing: border-box;
        }
        
        .error-state {
            background-color: rgba(127, 29, 29, 0.5); padding: 16px; border-radius: 16px;
            border: 1px solid #ef4444; color: white; font-size: 12px; text-align: center;
        }

        /* Notificación Flotante */
        #toast {
            position: fixed; top: 15%; left: 50%; transform: translateX(-50%);
            background-color: #22c55e; color: white; padding: 8px 16px;
            border-radius: 999px; font-size: 12px; font-weight: bold;
            opacity: 0; transition: opacity 0.3s; pointer-events: none;
            z-index: 50; display: flex; align-items: center; gap: 8px;
            box-shadow: 0 10px 15px -3px rgba(0, 0, 0, 0.3);
        }
        #toast.show { opacity: 1; }

        /* Botón de Agregar Flotante */
        #floating-fast-add {
            position: fixed; bottom: 12%; left: 50%; transform: translateX(-50%);
            background-color: #16a34a; border: 2px solid #4ade80; color: white;
            font-weight: 900; font-size: 16px; padding: 14px 28px;
            border-radius: 999px; box-shadow: 0 10px 25px -5px rgba(0,0,0,0.8);
            z-index: 60; display: flex; align-items: center; justify-content: center;
            gap: 8px; outline: none; white-space: nowrap; transition: transform 0.1s;
        }
        #floating-fast-add:active { transform: translateX(-50%) scale(0.95); }
        .badge-flotante {
            background: white; color: #16a34a; padding: 2px 8px; 
            border-radius: 12px; font-size: 14px; margin-left: 4px;
        }

        /* Animación Carga */
        @keyframes spin { 100% { transform: rotate(360deg); } }
        .fa-spin { animation: spin 1s linear infinite; }
    </style>
</head>
<body class="no-scrollbar">

    <div id="watch-face">
        <div id="content">
            <i class="fa-solid fa-circle-notch fa-spin text-blue" style="font-size: 36px;"></i>
            <p class="text-slate-light font-bold" style="font-size: 12px; margin-top: 8px;">Conectando...</p>
        </div>
    </div>

    <!-- Tostada de notificación -->
    <div id="toast">
        <i class="fa-solid fa-check"></i> <span id="toast-msg">Guardado</span>
    </div>

    <!-- Botón de guardado rápido -->
    <button id="floating-fast-add" class="hidden" onclick="submitLocalFastOrders()"></button>

    <script>
        const firebaseConfig = {
            apiKey: "AIzaSyBqrR3FQ7L7KCE5Wg8thRvyA6GpiUV2DPs",
            authDomain: "alasdebarrilwings.firebaseapp.com",
            projectId: "alasdebarrilwings",
            storageBucket: "alasdebarrilwings.firebasestorage.app",
            messagingSenderId: "826542576836",
            appId: "1:826542576836:web:dd1bc6f8bc4fd73d57a591"
        };

        let app, auth, db;
        let MENU = [];
        let tablesData = [];
        let ordersData = [];
        let currentTableId = null;
        let viewState = 'home';
        
        // Memoria para cobro rápido en smartwatch
        let localFastOrders = {};

        function showToast(msg) {
            const toast = document.getElementById('toast');
            document.getElementById('toast-msg').innerText = msg;
            toast.classList.add('show');
            setTimeout(() => {
                toast.classList.remove('show');
            }, 1500);
        }

        function renderHome() {
            viewState = 'home';
            currentTableId = null;
            localFastOrders = {}; // Limpiar memoria
            updateFloatingFastAddButton(); // Ocultar flotante
            
            const openTables = tablesData.filter(t => t.status === 'open').sort((a,b) => (b.openedAt?.seconds||0) - (a.openedAt?.seconds||0));

            let html = `<div class="watch-title"><i class="fa-solid fa-clock text-blue" style="margin-right:4px;"></i> A-LAS BARRIL</div>`;
            
            if(openTables.length === 0) {
                html += `<div class="empty-state">No hay mesas abiertas</div>`;
            } else {
                html += openTables.map(t => {
                    const isVip = t.isVip ? '<i class="fa-solid fa-crown text-pink" style="margin-left: 8px; font-size: 10px;"></i>' : '';
                    return `
                    <button onclick="renderTableDetail('${t.id}')" class="watch-btn">
                        <span class="truncate" style="font-size: 18px;">Mesa ${t.number}</span> ${isVip}
                    </button>`;
                }).join('');
            }
            
            document.getElementById('content').innerHTML = html;
            window.scrollTo(0, 0); 
        }

        function renderTableDetail(tid) {
            viewState = 'table';
            currentTableId = tid;
            localFastOrders = {}; // Limpiar memoria al entrar a la mesa
            updateFloatingFastAddButton(); // Ocultar flotante
            
            const t = tablesData.find(x => x.id === tid);
            if(!t) return renderHome();

            const ords = ordersData.filter(o => o.tableId === tid && o.status !== 'cancelled');
            const total = ords.reduce((a,c) => a + (c.price * c.quantity), 0);
            
            let html = `
                <button onclick="renderHome()" class="back-btn">
                    <i class="fa-solid fa-arrow-left"></i>
                </button>
                <div class="table-title">Mesa ${t.number}</div>
                <div class="table-subtitle">${t.nickname}</div>
                
                <div class="table-total">$${total}</div>
                
                <button onclick="renderFastMenu()" class="watch-btn btn-green">
                    <i class="fa-solid fa-bolt"></i> Cobro Rápido
                </button>
            `;
            document.getElementById('content').innerHTML = html;
            window.scrollTo(0, 0);
        }

        function renderFastMenu() {
            viewState = 'fastMenu';
            let html = `
                <button onclick="renderTableDetail('${currentTableId}')" class="back-btn">
                    <i class="fa-solid fa-arrow-left"></i>
                </button>
                <div class="watch-title"><i class="fa-solid fa-bolt text-amber" style="margin-right:4px;"></i> Rápido</div>
            `;

            // Filtrar y mostrar todo el menú con botones de + y -
            html += MENU.map(i => {
                const localQty = localFastOrders[i.id] ? localFastOrders[i.id].quantity : 0;
                const hiddenClass = localQty > 0 ? '' : 'hidden';

                return `
                <div style="display: flex; width: 100%; gap: 6px; margin-bottom: 8px;">
                    <button onclick="fastRemoveOrder('${i.id}')" class="btn-minus">
                        <i class="fa-solid fa-minus"></i>
                    </button>
                    <button onclick="fastAddOrder('${i.id}')" class="watch-btn watch-btn-item" style="margin-bottom: 0; position: relative; flex: 1;">
                        <div id="badge-${i.id}" class="${hiddenClass}" style="position: absolute; top: -4px; right: -4px; background-color: #3b82f6; color: white; font-size: 11px; font-weight: 900; width: 22px; height: 22px; border-radius: 50%; display: flex; align-items: center; justify-content: center; border: 2px solid #0f172a; z-index: 10;">${localQty}</div>
                        <span class="item-name">${i.name}</span>
                        <span class="item-price">$${i.price}</span>
                    </button>
                </div>
                `;
            }).join('');

            // Espaciador al final para que el botón flotante no tape el último producto
            html += `<div style="height: 70px; width: 100%;"></div>`;

            document.getElementById('content').innerHTML = html;
            updateFloatingFastAddButton();
            window.scrollTo(0, 0);
        }

        window.fastAddOrder = function(itemId) {
            const item = MENU.find(i => i.id === itemId);
            if (!localFastOrders[itemId]) {
                localFastOrders[itemId] = { item: item, quantity: 0 };
            }
            localFastOrders[itemId].quantity += 1;
            
            const badge = document.getElementById(`badge-${itemId}`);
            if (badge) {
                badge.innerText = localFastOrders[itemId].quantity;
                badge.classList.remove('hidden');
            }
            updateFloatingFastAddButton();
        }

        window.fastRemoveOrder = function(itemId) {
            if (localFastOrders[itemId] && localFastOrders[itemId].quantity > 0) {
                localFastOrders[itemId].quantity -= 1;
                const badge = document.getElementById(`badge-${itemId}`);
                if (badge) {
                    if (localFastOrders[itemId].quantity > 0) {
                        badge.innerText = localFastOrders[itemId].quantity;
                    } else {
                        badge.classList.add('hidden');
                        delete localFastOrders[itemId];
                    }
                }
                updateFloatingFastAddButton();
            }
        }

        window.updateFloatingFastAddButton = function() {
            let total = 0; let count = 0;
            Object.values(localFastOrders).forEach(o => { total += o.item.price * o.quantity; count += o.quantity; });
            
            const btn = document.getElementById('floating-fast-add');
            if (count > 0) {
                btn.innerHTML = `AGREGAR $${total} <span class="badge-flotante">${count}</span>`;
                btn.classList.remove('hidden');
            } else {
                btn.classList.add('hidden');
            }
        }

        window.submitLocalFastOrders = async function() {
            const orders = Object.values(localFastOrders);
            if (orders.length === 0) return;

            const btn = document.getElementById('floating-fast-add');
            btn.innerHTML = '<i class="fa-solid fa-spinner fa-spin"></i> GUARDANDO';

            try {
                const batch = db.batch();
                orders.forEach(o => {
                    const orderRef = db.collection('orders').doc();
                    batch.set(orderRef, {
                        tableId: currentTableId,
                        itemId: o.item.id,
                        itemName: o.item.name,
                        category: o.item.category,
                        price: o.item.price,
                        quantity: o.quantity,
                        modifiers: ['Reloj Rápido'],
                        status: 'delivered',
                        timestamp: firebase.firestore.FieldValue.serverTimestamp()
                    });

                    // Descuento de inventario integrado
                    if (o.item.invId) {
                        const menuRef = db.collection('menu_items').doc(o.item.id);
                        batch.update(menuRef, { sold_since_update: firebase.firestore.FieldValue.increment(o.quantity) });
                        
                        const invRef = db.collection('inventory').doc(o.item.invId);
                        batch.update(invRef, { stock: firebase.firestore.FieldValue.increment(-(o.item.invCost || 1) * o.quantity) });
                    }
                });
                
                await batch.commit();
                localFastOrders = {};
                btn.classList.add('hidden');
                
                showToast("Guardado");
                renderTableDetail(currentTableId);
            } catch (e) {
                console.error("Error watch order:", e);
                showToast("Error de red");
                btn.innerHTML = 'ERROR, INTENTA DE NUEVO';
            }
        }

        // ==========================================
        // ARRANQUE FIREBASE (OPTIMIZADO PARA RELOJ)
        // ==========================================
        try {
            firebase.initializeApp(firebaseConfig); 
            auth = firebase.auth(); 
            db = firebase.firestore();
            
            auth.onAuthStateChanged((user) => {
                if (user) {
                    document.getElementById('content').innerHTML = `
                        <i class="fa-solid fa-cloud-arrow-down text-green" style="font-size: 36px; margin-bottom: 8px;"></i>
                        <p class="text-slate-light font-bold" style="font-size: 12px;">Cargando mesas...</p>
                    `;

                    // Menu
                    db.collection('menu_items').onSnapshot(s => {
                        if (!s.empty) {
                            MENU = s.docs.map(d => ({id: d.id, ...d.data()})).sort((a,b) => (a.order || 0) - (b.order || 0));
                            if(viewState === 'fastMenu') renderFastMenu();
                        }
                    });

                    // Limitamos la lectura de Firebase solo a 3 días
                    const limitDate = new Date();
                    limitDate.setDate(limitDate.getDate() - 3);
                    const limitFb = firebase.firestore.Timestamp.fromDate(limitDate);

                    db.collection('tables').where('openedAt', '>=', limitFb).onSnapshot(s => { 
                        tablesData = s.docs.map(d=>({id:d.id, ...d.data()})); 
                        if(viewState === 'home') renderHome(); 
                        else if(viewState === 'table') renderTableDetail(currentTableId);
                    }, e => {
                        document.getElementById('content').innerHTML = `<div class="error-state">Error Mesas: ${e.message}</div>`;
                    });
                    
                    db.collection('orders').where('timestamp', '>=', limitFb).onSnapshot(s => { 
                        ordersData = s.docs.map(d=>({id:d.id, ...d.data()})); 
                        if(viewState === 'table') renderTableDetail(currentTableId);
                    });
                }
            });

            auth.signInAnonymously().catch(e => {
                document.getElementById('content').innerHTML = `<div class="error-state"><i class="fa-solid fa-triangle-exclamation" style="font-size:24px; margin-bottom:8px;"></i><br>Error de Conexión: ${e.message}</div>`;
            });

        } catch (e) { 
            document.getElementById('content').innerHTML = `<div class="error-state">Error Crítico: ${e.message}</div>`;
        }
    </script>
</body>
</html>
