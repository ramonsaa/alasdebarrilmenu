    <style>
        /* --- ESTILO RETRO GLOBAL --- */
        :root {
            --retro-cream: #f8f1e5;
            --retro-dark: #2c1e16;
            --retro-brown: #5c4033;
            --retro-red: #a63e3e;
            --retro-green: #557b55;
            --retro-yellow: #d4a353;
            --retro-blue: #4a6fa5;
        }

        body { 
            font-family: 'Old Standard TT', serif;
            background-color: var(--retro-cream);
            color: var(--retro-dark);
            user-select: none; 
            background-image: 
                linear-gradient(to right, rgba(92, 64, 51, 0.05) 1px, transparent 1px),
                linear-gradient(to bottom, rgba(92, 64, 51, 0.05) 1px, transparent 1px);
            background-size: 20px 20px;
        }
        
        .font-slab { font-family: 'Alfa Slab One', cursive; letter-spacing: 0.05em; } 
        .font-fancy { font-family: 'Abril Fatface', cursive; letter-spacing: 0.05em; }
        .font-typewriter { font-family: 'Special Elite', cursive; }
        
        .no-scrollbar::-webkit-scrollbar { display: none; }
        .no-scrollbar { -ms-overflow-style: none; scrollbar-width: none; }
        
        @media print {
            body * { visibility: hidden; }
            #receipt-area, #receipt-area * { visibility: visible; }
            #receipt-area { position: absolute; left: 0; top: 0; width: 100%; margin: 0; padding: 0; background: white; color: black; }
            @page { margin: 0; size: auto; }
        }
        
        /* Botones */
        .btn-retro {
            @apply py-3 rounded-sm font-bold text-white shadow-md uppercase tracking-wide border-2 border-[#2c1e16] transition-all cursor-pointer font-slab;
            box-shadow: 3px 3px 0 #2c1e16;
        }
        .btn-retro:active { box-shadow: 1px 1px 0 #2c1e16; transform: translate(2px, 2px); }
        .btn-retro-green { background-color: var(--retro-green); }
        .btn-retro-blue { background-color: var(--retro-blue); }
        .btn-retro-red { background-color: var(--retro-red); }
        .btn-retro-dark { background-color: var(--retro-brown); color: var(--retro-cream); }
        .btn-retro-neutral { background-color: #dcdcdc; color: var(--retro-dark); border-color: #999; box-shadow: 3px 3px 0 #999; }
        .btn-retro-yellow { background-color: var(--retro-yellow); color: var(--retro-dark); }

        /* Tarjetas */
        .card-retro {
            @apply rounded-sm shadow-sm p-3 border-2 border-[#5c4033] relative cursor-pointer transition bg-[#fffdf9];
            box-shadow: 4px 4px 0 rgba(92, 64, 51, 0.3);
        }
        .card-retro:active { box-shadow: 2px 2px 0 rgba(92, 64, 51, 0.3); transform: translate(2px, 2px); }
        .card-retro-vip { background-color: #fff0e6; border-color: #cba135; }

        /* Botones Selección */
        .option-btn { @apply border-2 rounded-sm p-2 text-center cursor-pointer transition-all font-bold text-[#5c4033] bg-[#fffdf9] border-[#a89f91] text-sm shadow-[2px_2px_0_#a89f91]; }
        .option-btn.clara.selected { background-color: var(--retro-yellow); border-color: var(--retro-brown); color: var(--retro-dark); box-shadow: 2px 2px 0 var(--retro-brown); }
        .option-btn.oscura.selected { background-color: var(--retro-brown); border-color: var(--retro-dark); color: var(--retro-cream); box-shadow: 2px 2px 0 var(--retro-dark); }
        
        .prep-radio { @apply border-2 rounded-sm p-2 text-center cursor-pointer transition-all font-medium text-[#5c4033] bg-[#fffdf9] border-[#a89f91] text-xs shadow-[2px_2px_0_#a89f91]; }
        .prep-radio.selected { background-color: var(--retro-blue); border-color: var(--retro-brown); color: var(--retro-cream); font-weight: 800; box-shadow: 2px 2px 0 var(--retro-brown); }

        .mod-btn { transition: all 0.1s; border-width: 2px; font-weight: 600; box-shadow: 2px 2px 0 var(--retro-brown); border-style: solid; }
        .mod-btn.btn-red { color: var(--retro-red); background-color: #fce8e8; border-color: var(--retro-red); }
        .mod-btn.btn-red.selected { background-color: var(--retro-red); color: var(--retro-cream); border-color: var(--retro-brown); }
        .mod-btn.btn-green { color: var(--retro-green); background-color: #e8fce8; border-color: var(--retro-green); }
        .mod-btn.btn-green.selected { background-color: var(--retro-green); color: var(--retro-cream); border-color: var(--retro-brown); }
        .mod-btn.btn-neutral { color: var(--retro-brown); background-color: #fffdf9; border-color: var(--retro-brown); }
        .mod-btn.btn-neutral.selected { background-color: var(--retro-brown); color: var(--retro-cream); border-color: var(--retro-dark); }

        .cat-header { font-size: 1rem; font-family: 'Alfa Slab One', cursive; text-transform: uppercase; color: var(--retro-brown); margin-top: 1.5rem; margin-bottom: 0.8rem; letter-spacing: 0.05em; border-bottom: 3px double var(--retro-brown); padding-bottom: 4px; text-align: center; }

        /* Inputs Retro */
        input, select {
            @apply border-2 border-[#a89f91] p-3 rounded-sm text-lg font-bold outline-none bg-[#fffdf9] text-[#5c4033] shadow-[inset_2px_2px_4px_rgba(92,64,51,0.1)];
            font-family: 'Special Elite', cursive;
        }
        
        .modal-retro { @apply bg-[#fffdf9] rounded-sm shadow-2xl w-full max-w-md overflow-hidden max-h-[90vh] flex flex-col border-4 border-double border-[#5c4033] shadow-[8px_8px_0_rgba(44,30,22,0.4)]; }

        /* Estilo para secciones de paquete */
        .pkg-section { @apply mb-4 border-2 border-[#a89f91] rounded-sm p-3 bg-[#fffdf9] shadow-[2px_2px_0_#a89f91]; }
        .pkg-title { @apply font-bold text-[#5c4033] mb-2 border-b-2 border-dashed border-[#a89f91] pb-1 text-sm uppercase font-typewriter; }
        
        /* Animación para el botón de cobro rápido */
        .fast-add-btn:active { transform: scale(0.95); background-color: #dcfce7; border-color: #22c55e; }
        @keyframes pop { 0% { transform: scale(1); } 50% { transform: scale(1.3); } 100% { transform: scale(1); } }
        .pop-anim { animation: pop 0.2s ease-in-out; }
    </style>
</head>
<body>

                    <img src="https://www.dropbox.com/scl/fi/htapbd4yf4m239y9zv2n1/Picture1.png?rlkey=o8je5uxe95avc9i9od6dmpbqh&raw=1" alt="Logo" class="w-full h-full object-contain sepia" onerror="this.src='https://placehold.co/100x100?text=AB'">

            <div class="flex flex-col justify-center items-center h-full text-[#5c4033] opacity-50 gap-4 font-typewriter">
                <i class="fa-solid fa-circle-notch fa-spin text-4xl"></i>
                <p class="text-sm font-bold animate-pulse">Cargando sistema...</p>
            </div>
        </main>

        <div id="receipt-area" class="hidden bg-[#fffdf9] p-4 text-xs w-[300px] mx-auto font-mono border-4 double border-[#5c4033] text-[#2c1e16]"></div>
    </div>

    <!-- Modales -->
    <div id="modal-overlay" class="fixed inset-0 bg-[#2c1e16] bg-opacity-80 hidden z-50 flex justify-center items-center p-4 backdrop-blur-sm">
        <div id="modal-content" class="modal-retro"></div>
    </div>

    <script>

        ];

        // ==========================================
        // 2. DEFINICIÓN DE TODAS LAS FUNCIONES
        // ==========================================
        window.updateStatusDisplay = function() {
            const ind = document.getElementById('status-indicator');
            const txt = document.getElementById('status-text');
            if (!navigator.onLine) {
                ind.classList.remove('hidden'); txt.innerHTML = '<i class="fa-solid fa-wifi"></i> MODO OFFLINE';
            } else { ind.classList.add('hidden'); }
        }

            document.getElementById('content-area').innerHTML = `<div class="flex flex-col justify-center items-center h-full p-6 text-center"><h2 class="font-bold text-2xl text-[#a63e3e] font-slab">${title}</h2><p class="text-[#5c4033] font-typewriter mt-2">${details}</p><button onclick="location.reload()" class="mt-6 btn-retro btn-retro-dark px-6 py-2">Reintentar</button></div>`;

            if(!currentRole) return;
            if(currentRole === 'waiter') currentTableId ? window.renderTableDetail(currentTableId) : window.renderWaiterDashboard();

            else if(currentRole === 'bar') window.renderBoard('bar');

        window.renderHome = function() {
            currentRole = null;
            document.getElementById('header-title').innerText = 'A-LAS DE BARRIL';
            document.getElementById('content-area').innerHTML = `

                    <h2 class="text-3xl font-bold text-[#5c4033] mb-4 pb-2 border-b-[3px] double border-[#cba135] uppercase tracking-widest font-slab" style="text-shadow: 1px 1px 0 #f8f1e5;">Selecciona Perfil</h2>

        window.renderWaiterDashboard = function() {

                const closedDate = t.closedAt?.seconds * 1000 || 0;

                        <div class="flex justify-between items-end mb-3 border-b-[3px] double border-[#5c4033] pb-1">
                            <h3 class="font-black text-[#5c4033] text-xl uppercase tracking-wider font-slab">${sectionTitle}</h3>
                            ${!showingDebts ? `<button onclick="window.openNewTableModal()" class="btn-retro btn-retro-green text-xs px-3 py-2 flex items-center gap-1"><i class="fa-solid fa-plus"></i> NUEVA</button>` : ''}
                        </div>
                        <div class="grid grid-cols-2 gap-4">
                            ${!showingDebts && openTables.length === 0 ? '<p class="col-span-2 text-[#a89f91] text-sm text-center italic py-4 bg-[#fffdf9] rounded-sm border-2 border-dashed border-[#a89f91] font-typewriter">No hay mesas abiertas</p>' : ''}
                            ${showingDebts && debtTables.length === 0 ? '<p class="col-span-2 text-[#a89f91] text-sm text-center italic py-4 bg-[#fffdf9] rounded-sm border-2 border-dashed border-[#a89f91] font-typewriter">No hay deudas</p>' : ''}
                            ${!showingDebts ? openTables.map(t => window.createTableCard(t)).join('') : debtTables.map(t => window.createTableCard(t)).join('')}
                        </div>
                    </div>
                    ${!showingDebts ? `<div class="mt-6 opacity-80"><h3 class="font-bold text-[#5c4033] text-lg uppercase mb-3 border-b-[3px] double border-[#5c4033] pb-1 font-slab">Cerradas (8 días)</h3><div class="grid grid-cols-2 gap-4">${closedTables.length ? closedTables.map(t => window.createTableCard(t)).join('') : '<p class="col-span-2 text-[#a89f91] text-xs text-center font-typewriter">Historial vacío</p>'}</div></div>` : ''}
                </div>`;
            document.getElementById('content-area').innerHTML = html;
        }

        window.createTableCard = function(t) {
            const ords = ordersData.filter(o => o.tableId === t.id && o.status !== 'cancelled');
            const total = ords.reduce((a,c) => a + (c.price * c.quantity), 0);
            const deposit = t.deposit || 0;
            const remaining = total - deposit;
            let cardBgClass = '', borderColor = 'border-[#5c4033]', badge = '', statusIconColor = 'text-[#5c4033]';
            
            if (t.isVip) { cardBgClass = 'card-retro-vip'; borderColor = 'border-[#cba135]'; }
            if (t.status === 'open') {
                const pending = ords.some(o => o.status !== 'delivered');
                borderColor = pending ? 'border-[#d4a353]' : 'border-[#557b55]';
                statusIconColor = pending ? 'text-[#d4a353]' : 'text-[#557b55]';
                badge = pending ? `<i class="fa-solid fa-clock animate-pulse ${statusIconColor}"></i>` : `<i class="fa-solid fa-check ${statusIconColor}"></i>`;
            } else if (t.status === 'debt') { borderColor = 'border-[#a63e3e]'; cardBgClass = 'bg-[#fce8e8]'; statusIconColor = 'text-[#a63e3e]'; badge = `<i class="fa-solid fa-file-invoice-dollar ${statusIconColor}"></i>`;
            } else { cardBgClass = 'bg-[#e0d8c8]'; statusIconColor = 'text-[#a89f91]'; badge = `<i class="fa-solid fa-lock ${statusIconColor}"></i>`; }
            
            let vipBadge = t.isVip ? `<span class="absolute -top-3 -left-3 bg-[#cba135] text-[#2c1e16] text-[10px] px-3 py-1 rounded-sm font-bold shadow-[2px_2px_0_#2c1e16] border-2 border-[#2c1e16]" style="font-family: 'Abril Fatface', cursive;"><i class="fa-solid fa-crown"></i> VIP</span>` : '';
            let priceDisplay = `$${total}`; if (deposit > 0) priceDisplay = `<span class="text-xs text-[#a63e3e] line-through mr-1 font-mono">$${total}</span> $${remaining}`;
            const dateStr = t.openedAt ? new Date(t.openedAt.seconds * 1000).toLocaleString('es-MX', { day: '2-digit', month: '2-digit', hour: '2-digit', minute: '2-digit', hour12: false }).replace(',', '') : '';

            return `<div onclick="window.renderTableDetail('${t.id}')" class="card-retro ${cardBgClass} ${borderColor}">
                    ${vipBadge}
                    <div class="flex justify-between items-start mb-2">
                        <span class="text-[11px] font-mono font-bold text-[#5c4033] bg-[#e0d8c8] px-2 py-0.5 rounded-sm border-2 border-[#a89f91] shadow-[1px_1px_0_#a89f91]">#${t.uniqueId || '---'}</span>
                        <div class="flex flex-col items-end">
                             <span class="text-[10px] text-[#5c4033] font-mono mb-0.5 font-bold">${dateStr}</span>
                             <div class="bg-[#fffdf9] border-2 border-[#a89f91] rounded-full p-1 shadow-[1px_1px_0_#a89f91]">${badge}</div>
                        </div>
                    </div>
                    <div class="text-3xl font-black text-[#2c1e16] leading-tight mb-1 text-center font-slab" style="text-shadow: 1px 1px 0 #cba135; overflow-wrap: break-word;">${t.nickname}</div>
                    <div class="text-xs text-[#5c4033] font-bold mb-3 uppercase tracking-wider text-center font-typewriter border-b-2 border-dashed border-[#a89f91] pb-1">Mesa #${t.number}</div>
                    <div class="text-xl font-bold text-[#2c1e16] text-right pt-1 font-typewriter">${priceDisplay}</div>
                </div>`;
        }

        window.toggleDebtView = function() { showingDebts = !showingDebts; window.renderWaiterDashboard(); }
        window.searchTicket = async function() { const id=parseInt(document.getElementById('search-ticket-id').value); if(!id)return; const found=tablesData.find(t=>t.uniqueId===id); if(found)window.renderTableDetail(found.id); else alert("No encontrado"); }

        // --- BORRADO INDIVIDUAL EN CUENTA ---
        window.deleteOrder = async function(orderId, currentQty, itemName) {
            event.stopPropagation(); 
            if (currentQty > 1) {
                window.openDeleteQuantityModal(orderId, currentQty, itemName);
            } else {
                if(confirm(`¿Borrar "${itemName}" de la cuenta?`)) {
                    try { await db.collection('orders').doc(orderId).delete(); } catch(e) { alert("Error: " + e.message); }
                }
            }
        }

        window.openDeleteQuantityModal = function(orderId, currentQty, itemName) {
             document.getElementById('modal-content').innerHTML = `
                <div class="p-6 text-center bg-[#f8f1e5] modal-retro border-0 shadow-none relative">
                    <h3 class="font-black text-xl mb-4 text-[#a63e3e] font-slab border-b-2 border-[#a63e3e] pb-2 inline-block">BORRAR ARTÍCULO</h3>
                    <p class="mb-2 text-[#5c4033] text-sm font-typewriter">Hay <strong>${currentQty}</strong> ordenados de:<br><span class="text-[#2c1e16] font-bold text-lg font-fancy">${itemName}</span></p>
                    <p class="mb-4 text-[#a89f91] text-xs uppercase tracking-widest font-bold">¿Cuántos eliminar?</p>
                    
                    <div class="flex justify-center items-center gap-6 mb-6 bg-[#fffdf9] p-3 rounded-sm border-2 border-[#a89f91] shadow-inner">
                         <button onclick="window.adjDelQty(-1)" class="w-12 h-12 rounded-full bg-[#e0d8c8] text-[#5c4033] font-bold text-2xl border-2 border-[#a89f91] shadow-[2px_2px_0_#a89f91] active:translate-y-1 active:shadow-none transition">-</button>
                         <span id="del-qty-val" class="text-4xl font-black text-[#a63e3e] font-typewriter">1</span>
                         <button onclick="window.adjDelQty(1, ${currentQty})" class="w-12 h-12 rounded-full bg-[#a63e3e] text-[#f8f1e5] font-bold text-2xl border-2 border-[#2c1e16] shadow-[2px_2px_0_#2c1e16] active:translate-y-1 active:shadow-none transition">+</button>
                    </div>

                    <div class="flex gap-3">
                        <button onclick="window.closeModal()" class="flex-1 btn-retro btn-retro-neutral py-3 text-[#5c4033]">Cancelar</button>
                        <button onclick="window.confirmDelete('${orderId}', ${currentQty})" class="flex-1 btn-retro btn-retro-red py-3">Confirmar</button>
                    </div>
                </div>`;
            document.getElementById('modal-overlay').classList.remove('hidden');
        }

        window.adjDelQty = function(delta, max) {
            const el = document.getElementById('del-qty-val');
            let val = parseInt(el.innerText) + delta;
            if (val < 1) val = 1;
            if (max && val > max) val = max;
            el.innerText = val;
        }

        window.confirmDelete = async function(orderId, currentQty) {
            const qtyToDelete = parseInt(document.getElementById('del-qty-val').innerText);
            if (qtyToDelete >= currentQty) {
                await db.collection('orders').doc(orderId).delete();
            } else {
                await db.collection('orders').doc(orderId).update({ quantity: currentQty - qtyToDelete });
            }
            window.closeModal();
        }

        // --- LÓGICA DE COBRO RÁPIDO ---
        window.setCobrarMode = function(isCobrar) {
            if (Object.keys(localFastOrders).length > 0 && !isCobrar) {
                if (!confirm("Tienes artículos sin agregar. ¿Deseas descartarlos al salir del modo Rápido?")) return;
            }
            localFastOrders = {};
            isCobrarMode = isCobrar;
            scrollPositions.menu = 0;
            window.renderTableDetail(currentTableId);
        }

        window.getFastMenuGroups = function() {
            let items = [];
            MENU.forEach(item => {
                items.push({ ...item, displayName: item.name, finalPrice: item.price, extraName: '', extraPrice: 0 });
                if (item.isBeer) {
                    items.push({ 
                        ...item, 
                        displayName: `${item.name} + Clamato`, 
                        finalPrice: item.price + 5, 
                        extraName: '+ Clamato', 
                        extraPrice: 5 
                    });
                }
            });

            let groups = {};
            items.forEach(i => {
                if (!groups[i.finalPrice]) groups[i.finalPrice] = [];
                groups[i.finalPrice].push(i);
            });
            return groups;
        }

        window.renderFastMenu = function() {
            const groups = window.getFastMenuGroups();
            const sortedPrices = Object.keys(groups).map(Number).sort((a,b) => a - b);
            
            return sortedPrices.map(price => {
                const items = groups[price];
                const buttons = items.map(i => {
                    const safeKey = (i.id + (i.extraName || '')).replace(/[^a-zA-Z0-9]/g, '');
                    const localQty = localFastOrders[safeKey] ? localFastOrders[safeKey].quantity : 0;
                    const hiddenClass = localQty > 0 ? '' : 'hidden';

                    return `
                    <div class="flex h-16 rounded-sm shadow-[2px_2px_0_#a89f91] border-2 border-[#a89f91] overflow-hidden bg-[#fffdf9]">
                        <button onclick="window.fastRemoveOrder('${i.id}', '${i.extraName}')" class="w-1/4 bg-[#fce8e8] hover:bg-[#f8d7d7] text-[#a63e3e] border-r-2 border-[#a89f91] flex items-center justify-center active:bg-[#f4c4c4] transition-colors">
                            <i class="fa-solid fa-minus"></i>
                        </button>
                        <button onclick="window.fastAddOrder('${i.id}', '${i.extraName}', ${i.extraPrice})" class="w-3/4 flex flex-col items-center justify-center relative active:bg-[#e8fce8] transition-colors p-1">
                            <div id="badge-${safeKey}" class="absolute -top-1 -right-1 bg-[#a63e3e] text-[#fffdf9] text-[11px] font-black w-6 h-6 rounded-full flex items-center justify-center shadow-[1px_1px_0_#2c1e16] border border-[#2c1e16] ${hiddenClass} z-20 transform transition-transform">${localQty}</div>
                            <span class="text-xs font-bold text-[#2c1e16] leading-tight text-center relative z-10" style="font-family: 'Abril Fatface', cursive;">${i.displayName}</span>
                        </button>
                    </div>
                    `;
                }).join('');
                
                return `
                    <div class="mb-4 bg-[#e0d8c8] p-3 rounded-sm border-2 border-[#a89f91] shadow-[2px_2px_0_#a89f91]">
                        <h4 class="font-black text-[#5c4033] border-b-2 border-dashed border-[#a89f91] mb-3 pb-1 flex justify-between font-slab text-lg">
                            <span>$${price}</span>
                            <span class="text-xs text-[#a89f91] font-normal self-end font-typewriter">${items.length} items</span>
                        </h4>
                        <div class="grid grid-cols-2 gap-3">
                            ${buttons}
                        </div>
                    </div>
                `;
            }).join('');
        }

        window.fastAddOrder = function(itemId, extraName, extraPrice) {
            const item = MENU.find(i => i.id === itemId);
            const finalName = extraName ? `${item.name} ${extraName}` : item.name;
            const finalPrice = item.price + extraPrice;
            const safeKey = (itemId + (extraName || '')).replace(/[^a-zA-Z0-9]/g, '');

            if (!localFastOrders[safeKey]) {
                localFastOrders[safeKey] = {
                    item: item, finalName: finalName, finalPrice: finalPrice,
                    quantity: 0, category: item.category
                };
            }
            
            localFastOrders[safeKey].quantity += 1;
            
            const badge = document.getElementById(`badge-${safeKey}`);
            if (badge) {
                badge.innerText = localFastOrders[safeKey].quantity;
                badge.classList.remove('hidden', 'pop-anim');
                void badge.offsetWidth;
                badge.classList.add('pop-anim');
            }
            window.updateFloatingFastAddButton();
        }

        window.fastRemoveOrder = function(itemId, extraName) {
            const safeKey = (itemId + (extraName || '')).replace(/[^a-zA-Z0-9]/g, '');
            if (localFastOrders[safeKey] && localFastOrders[safeKey].quantity > 0) {
                localFastOrders[safeKey].quantity -= 1;
                const badge = document.getElementById(`badge-${safeKey}`);
                if (badge) {
                    if (localFastOrders[safeKey].quantity > 0) {
                        badge.innerText = localFastOrders[safeKey].quantity;
                        badge.classList.remove('pop-anim');
                        void badge.offsetWidth; 
                        badge.classList.add('pop-anim');
                    } else {
                        badge.classList.add('hidden');
                        delete localFastOrders[safeKey];
                    }
                }
                window.updateFloatingFastAddButton();
            }
        }

        window.updateFloatingFastAddButton = function() {
            let total = 0; let count = 0;
            Object.values(localFastOrders).forEach(o => { total += o.finalPrice * o.quantity; count += o.quantity; });
            const btn = document.getElementById('floating-fast-add');
            if (btn) {
                if (count > 0) {
                    btn.innerHTML = `AGREGAR $${total} <span class="text-xs ml-2 bg-[#fffdf9] text-[#557b55] px-2 py-0.5 rounded-full border-2 border-[#557b55] shadow-inner">${count}</span>`;
                    btn.classList.remove('hidden');
                } else { btn.classList.add('hidden'); }
            }
        }

        window.submitLocalFastOrders = async function() {
            const orders = Object.values(localFastOrders);
            if (orders.length === 0) return;

            const btn = document.getElementById('floating-fast-add');
            if(btn) btn.innerHTML = '<i class="fa-solid fa-spinner fa-spin"></i> GUARDANDO...';

            try {
                const promises = orders.map(o => {
                    return db.collection('orders').add({
                        tableId: currentTableId, itemId: o.item.id, itemName: o.finalName, category: o.category,
                        price: o.finalPrice, quantity: o.quantity, modifiers: ['Cobro rápido'], status: 'delivered', timestamp: firebase.firestore.FieldValue.serverTimestamp()
                    });
                });
                
                await Promise.all(promises);
                localFastOrders = {}; 
                
                const statusTxt = document.getElementById('status-indicator');
                statusTxt.innerHTML = `<i class="fa-solid fa-check text-[#557b55]"></i> Agregados correctamente`;
                statusTxt.className = "absolute left-1/2 transform -translate-x-1/2 px-4 py-2 rounded-sm border-2 border-[#2c1e16] shadow-[2px_2px_0_#2c1e16] flex items-center gap-2 top-14 md:top-auto bg-[#fffdf9] text-[#2c1e16] z-[60] font-bold font-typewriter";
                statusTxt.classList.remove('hidden');
                setTimeout(() => { statusTxt.classList.add('hidden'); }, 2000);

                window.renderTableDetail(currentTableId);
            } catch (e) {
                alert("Error al guardar: " + e.message);
                window.updateFloatingFastAddButton();
            }
        }

        // --- MANEJO DE PESTAÑAS Y DETALLE MESA ---
        window.switchTab = function(t) {
            if (t === 'orders' && Object.keys(localFastOrders).length > 0) {
                currentTab = 'orders';
                window.submitLocalFastOrders(); 
                return;
            }
            currentTab = t;
            if(t==='menu'){ 
                document.getElementById('tab-menu')?.classList.remove('hidden'); 
                document.getElementById('tab-orders')?.classList.add('hidden'); 
                document.getElementById('order-footer')?.classList.add('hidden'); 
                document.getElementById('tab-btn-menu').className="flex-1 py-3 text-[#2c1e16] border-b-4 border-[#cba135] bg-[#fff0e6] font-bold tracking-wide font-fancy";
                document.getElementById('tab-btn-orders').className="flex-1 py-3 text-[#a89f91] font-bold hover:bg-[#fff0e6] transition tracking-wide font-fancy";
            } else { 
                document.getElementById('tab-menu')?.classList.add('hidden'); 
                document.getElementById('tab-orders')?.classList.remove('hidden'); 
                document.getElementById('order-footer')?.classList.remove('hidden');
                document.getElementById('tab-btn-orders').className="flex-1 py-3 text-[#2c1e16] border-b-4 border-[#cba135] bg-[#fff0e6] font-bold tracking-wide font-fancy";
                document.getElementById('tab-btn-menu').className="flex-1 py-3 text-[#a89f91] font-bold hover:bg-[#fff0e6] transition tracking-wide font-fancy";
            }
        }

        window.renderTableDetail = function(tid) {
            currentTableId = tid;
            const t = tablesData.find(x => x.id === tid);
            if(!t) return window.renderWaiterDashboard();

            const prevMenu = document.getElementById('tab-menu');
            const prevOrders = document.getElementById('tab-orders');
            if (prevMenu) scrollPositions.menu = prevMenu.scrollTop;
            if (prevOrders) scrollPositions.orders = prevOrders.scrollTop;

            const uniqueDisplay = t.uniqueId ? `#${t.uniqueId}` : '';
            const ords = ordersData.filter(o => o.tableId === tid && o.status !== 'cancelled').sort((a,b) => (b.timestamp?.seconds||0) - (a.timestamp?.seconds||0));
            const total = ords.reduce((a,c) => a + (c.price * c.quantity), 0);
            const deposit = t.deposit || 0;
            const remaining = total - deposit;

            const isClosed = t.status === 'closed';
            const showMenu = !isClosed && currentTab === 'menu';
            const showOrders = isClosed || currentTab === 'orders';

            const menuBtnClass = showMenu ? "flex-1 py-3 text-[#2c1e16] border-b-4 border-[#cba135] bg-[#fff0e6] font-bold tracking-wide font-fancy" : "flex-1 py-3 text-[#a89f91] font-bold hover:bg-[#fff0e6] transition tracking-wide font-fancy";
            const ordersBtnClass = showOrders ? "flex-1 py-3 text-[#2c1e16] border-b-4 border-[#cba135] bg-[#fff0e6] font-bold tracking-wide font-fancy" : "flex-1 py-3 text-[#a89f91] font-bold hover:bg-[#fff0e6] transition tracking-wide font-fancy";

            let closeBtnText = t.status === 'debt' ? "Liquidar Deuda" : "Cerrar Cuenta";
            let closeBtnColorClass = t.status === 'debt' ? "btn-retro-blue" : "btn-retro-green";
            
            let totalDisplay = `<div class="flex justify-between mb-3 font-black text-2xl text-[#2c1e16] px-2" style="font-family: 'Special Elite', cursive;"><span style="font-family: 'Abril Fatface', cursive;">Total</span><span>$${total}</span></div>`;
            if (deposit > 0) totalDisplay = `<div class="flex justify-between text-sm text-[#5c4033] font-mono"><span>Subtotal</span><span>$${total}</span></div><div class="flex justify-between text-sm text-[#a63e3e] font-mono"><span>A cuenta</span><span>-$${deposit}</span></div><div class="flex justify-between font-black text-2xl text-[#2c1e16] border-t-4 double border-[#5c4033] pt-2 mt-2" style="font-family: 'Special Elite', cursive;"><span style="font-family: 'Abril Fatface', cursive;">Restante</span><span>$${remaining}</span></div>`;
            
            let footerHtml = isClosed ? `<div id="order-footer" class="fixed bottom-0 w-full bg-[#e0d8c8] p-4 shadow-[0_-4px_0_rgba(92,64,51,0.8)] z-30 border-t-[3px] double border-[#5c4033]"><div class="flex justify-between mb-3 font-bold text-2xl text-[#2c1e16] px-2" style="font-family: 'Special Elite', cursive;"><span style="font-family: 'Abril Fatface', cursive;">Total Final</span><span>$${total}</span></div><div class="flex gap-3"><button onclick="window.printR('${tid}')" class="flex-1 btn-retro btn-retro-dark py-3"><i class="fa-solid fa-print"></i> Ticket</button><button onclick="window.downloadPDF('${tid}')" class="flex-1 btn-retro btn-retro-red py-3"><i class="fa-solid fa-file-pdf"></i> PDF</button></div><div class="text-center text-xs text-[#a63e3e] mt-3 font-bold uppercase tracking-[0.2em] font-mono border-t-2 border-dashed border-[#a63e3e] pt-2">MESA CERRADA - ARCHIVO</div></div>` : 
            `<div id="order-footer" class="fixed bottom-0 w-full bg-[#fffdf9] p-4 shadow-[0_-4px_0_rgba(92,64,51,0.3)] z-30 border-t-[3px] double border-[#cba135] ${showOrders ? '' : 'hidden'}">${totalDisplay}<button onclick="window.openCloseAccountModal('${tid}')" class="w-full btn-retro ${closeBtnColorClass} py-4 text-lg mt-2">${closeBtnText}</button></div>`;
            
            const pageBgClass = t.isVip ? 'bg-[#fff0e6]' : 'bg-[#fffdf9]';
            const vipHeader = t.isVip ? `<span class="ml-3 bg-[#cba135] text-[#2c1e16] text-[11px] px-3 py-1 rounded-sm font-bold shadow-[2px_2px_0_#2c1e16] border-2 border-[#2c1e16]" style="font-family: 'Abril Fatface', cursive;"><i class="fa-solid fa-crown"></i> VIP</span>` : '';

            let menuContentHtml = ''; let floatingBtnHtml = '';

            if (isCobrarMode) {
                menuContentHtml = window.renderFastMenu();
                let localTotal = 0; let localCount = 0;
                Object.values(localFastOrders).forEach(o => { localTotal += o.finalPrice * o.quantity; localCount += o.quantity; });
                const floatHidden = localCount > 0 ? '' : 'hidden';
                
                floatingBtnHtml = `<button id="floating-fast-add" onclick="window.submitLocalFastOrders()" class="${floatHidden} fixed bottom-6 right-6 btn-retro btn-retro-green font-black text-xl py-4 px-6 rounded-sm shadow-[4px_4px_0_#2c1e16] z-[60] flex items-center justify-center gap-2">AGREGAR $${localTotal} <span class="text-xs ml-2 bg-[#fffdf9] text-[#557b55] px-2 py-0.5 rounded-full border-2 border-[#557b55] shadow-inner font-mono">${localCount}</span></button>`;
            } else {
                menuContentHtml = `<h3 class="cat-header">Cocina</h3><div class="grid gap-3 mb-8">${window.renderMenuSection('kitchen')}</div><h3 class="cat-header">Barra</h3><div class="grid gap-3">${window.renderMenuSection('bar')}</div>`;
            }

            const switchHtml = isClosed ? '' : `
                <div class="flex justify-center mb-6">
                    <div class="bg-[#e0d8c8] rounded-sm p-1 flex shadow-[inset_2px_2px_0_rgba(92,64,51,0.2)] w-full max-w-[320px] relative h-12 items-center border-2 border-[#a89f91]">
                        <button onclick="window.setCobrarMode(false)" class="flex-1 text-xs font-black z-10 transition-colors ${!isCobrarMode ? 'text-[#f8f1e5]' : 'text-[#5c4033]'} font-slab">📝 ORDENAR</button>
                        <button onclick="window.setCobrarMode(true)" class="flex-1 text-xs font-black z-10 transition-colors ${isCobrarMode ? 'text-[#f8f1e5]' : 'text-[#5c4033]'} font-slab">💲 RÁPIDO</button>
                        <div class="absolute top-1 bottom-1 w-[calc(50%-4px)] ${!isCobrarMode ? 'bg-[#cba135] border-[#5c4033]' : 'bg-[#557b55] border-[#2c1e16]'} rounded-sm border-2 shadow-[2px_2px_0_rgba(44,30,22,0.5)] transition-all duration-300 ${isCobrarMode ? 'translate-x-[calc(100%+4px)]' : ''}"></div>
                    </div>

            const num = document.getElementById('ntn').value;

            const isVip = document.getElementById('ntvip').checked;
            if(!num) return;
            try {
                await db.runTransaction(async (transaction) => {
                    const counterRef = db.collection('config').doc('counters_tables');
                    const counterDoc = await transaction.get(counterRef);
                    let newId = 1000;
                    if (counterDoc.exists) newId = counterDoc.data().current + 1;
                    transaction.set(counterRef, { current: newId });
                    
                    const newTableRef = db.collection('tables').doc();
                    transaction.set(newTableRef, { number: num, nickname: nick, status: 'open', openedAt: firebase.firestore.FieldValue.serverTimestamp(), uniqueId: newId, isVip: isVip });

            const deposit = t.deposit || 0;
            const remaining = total - deposit;
            const date = new Date().toLocaleString();
            const grouped = {};
            ords.forEach(o => { const key = o.itemName + (o.modifiers ? o.modifiers.join('') : ''); if(!grouped[key]) grouped[key] = { ...o, qty: 0, total: 0 }; grouped[key].qty += o.quantity; grouped[key].total += (o.price * o.quantity); });

            let totalHtml = `<div style="border-top:1px dashed #000; margin-top:15px; padding-top:10px; display:flex; justify-content:space-between; font-weight:bold; font-size:16px;"><span>TOTAL</span><span>$${total}</span></div>`;
            if (deposit > 0) {
                totalHtml = `
                    <div style="border-top:1px dashed #000; margin-top:10px; padding-top:5px; display:flex; justify-content:space-between; font-size:12px;"><span>Subtotal</span><span>$${total}</span></div>
                    <div style="display:flex; justify-content:space-between; font-size:12px;"><span>A Cuenta</span><span>-$${deposit}</span></div>
                    <div style="margin-top:5px; padding-top:5px; border-top:1px solid #000; display:flex; justify-content:space-between; font-weight:bold; font-size:16px;"><span>RESTANTE</span><span>$${remaining}</span></div>
                `;
            }

            document.getElementById('receipt-area').innerHTML = `<div style="text-align:center; margin-bottom:15px; font-family: monospace;"><img src="https://www.dropbox.com/scl/fi/htapbd4yf4m239y9zv2n1/Picture1.png?rlkey=o8je5uxe95avc9i9od6dmpbqh&raw=1" style="width: 60%; max-width: 150px; display: block; margin: 0 auto 10px auto;" onerror="this.style.display='none'"><h2 style="font-weight:bold; font-size:18px; margin:0;">A-LAS DE BARRIL</h2><p style="margin:0; font-size:10px;">--- COPIA CLIENTE ---</p><br><p style="margin:0; font-size:12px;">Ticket #${t.uniqueId||'---'}</p><p style="margin:0; font-size:12px;">${date}</p></div><div style="border-bottom:1px dashed #000; margin-bottom:10px;"></div><div style="font-weight:bold; margin-bottom:10px; font-size:14px;">Mesa: ${t.number}</div>${itemsHtml}${totalHtml}<div style="text-align:center; margin-top:30px; font-size:10px;"><p>¡Gracias por su visita!</p><p>Wifi: AlasInvitado</p></div>`;
            window.print();
        }

        window.downloadPDF = function(tid) {
            const { jsPDF } = window.jspdf;
            const doc = new jsPDF({ orientation: "portrait", unit: "mm", format: [80, 200] }); 
            const t = tablesData.find(x=>x.id===tid);
            const ords = ordersData.filter(x=>x.tableId===tid && x.status!=='cancelled');
            const total = ords.reduce((acc,c)=>acc+(c.price*c.quantity),0);
            const deposit = t.deposit || 0;
            const remaining = total - deposit;
            
            const cardCheckbox = document.getElementById('close-card-check');
            const isCardPayment = cardCheckbox && cardCheckbox.checked;
            const cardFee = isCardPayment ? remaining * 0.04 : 0; 
            const finalRemaining = remaining + cardFee;

            doc.setFontSize(14); doc.text("A-LAS DE BARRIL", 40, 10, { align: "center" });
            doc.setFontSize(10); doc.text("Ticket #" + (t.uniqueId || '---'), 40, 18, { align: "center" });
            doc.text(new Date().toLocaleString(), 40, 23, { align: "center" });
            doc.line(5, 26, 75, 26); doc.text(`Mesa: ${t.number}`, 5, 32);
            let y = 38; doc.setFontSize(9);
            ords.forEach(o => {
                doc.text(`${o.quantity}x ${o.itemName}`, 5, y);
                doc.text(`$${o.price * o.quantity}`, 75, y, { align: "right" });
                y += 5;
                if(o.modifiers && o.modifiers.length) { doc.setFontSize(7); doc.text(`(${o.modifiers.join(', ')})`, 10, y); doc.setFontSize(9); y += 4; }
            });
            doc.line(5, y, 75, y); y += 5;
            
            if (deposit > 0) {
                doc.text("Subtotal:", 5, y); doc.text(`$${total}`, 75, y, { align: "right" }); y += 5;
                doc.text("A Cuenta:", 5, y); doc.text(`-$${deposit}`, 75, y, { align: "right" }); y += 5;
            }

            if (isCardPayment) {
                doc.text("Restante Base:", 5, y); doc.text(`$${remaining}`, 75, y, { align: "right" }); y += 5;
                doc.text("Comisión (4%):", 5, y); doc.text(`$${cardFee.toFixed(2)}`, 75, y, { align: "right" }); y += 5;
                doc.setFontSize(12); doc.text("TOTAL A PAGAR:", 5, y); doc.text(`$${finalRemaining.toFixed(2)}`, 75, y, { align: "right" }); y += 5; doc.setFontSize(9);
            } else {
                doc.setFontSize(12); doc.text("TOTAL A PAGAR:", 5, y); doc.text(`$${remaining}`, 75, y, { align: "right" }); y += 5; doc.setFontSize(9);
            }
            
            y += 10; doc.setFontSize(8); doc.text("¡Gracias por su visita!", 40, y, { align: "center" });
            doc.save(`Ticket_Mesa_${t.number}.pdf`);
        }

        // ==========================================
        // 3. ARRANQUE DEL SISTEMA
        // ==========================================
        try {
            firebase.initializeApp(firebaseConfig); 
            auth = firebase.auth(); 
            db = firebase.firestore();
            
            // Persistencia offline silenciosa
            db.enablePersistence({synchronizeTabs:true}).catch(err => console.warn("Offline persistence warn:", err.code));
            
            auth.onAuthStateChanged((user) => {
                if (user) {
                    currentUser = user;
                    
                    db.collection('tables').onSnapshot(s => { 
                        tablesData = s.docs.map(d=>({id:d.id, ...d.data()})); 
                        window.refreshCurrentView(); 
                    }, err => window.showError("Error leyendo Mesas", err.message));
                    
                    db.collection('orders').onSnapshot(s => { 
                        ordersData = s.docs.map(d=>({id:d.id, ...d.data()})); 
                        window.refreshCurrentView(); 
                    }, err => window.showError("Error leyendo Pedidos", err.message));
                    
                    window.renderHome(); 
                }
            });

            async function initApp() { 
                try { 
                    await auth.signInAnonymously(); 
                } catch (e) { 
                    window.showError("Error de Conexión o Permisos", "Si es la primera vez, asegúrate de activar el inicio de sesión anónimo en Firebase.<br><br>Detalle: " + e.message); 
                } 
            }
            
            initApp();

        } catch (e) { 
            window.showError("Error Crítico de Firebase", e.message); 
        }

    </script>
</body>
</html>
