
<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>GastroApp Pro - A-LAS DE BARRIL</title>
    
    <!-- Tailwind CSS -->
    <script src="https://cdn.tailwindcss.com"></script>
    <!-- Font Awesome -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <!-- jsPDF -->
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>

    <!-- FIREBASE COMPAT -->
    <script src="https://www.gstatic.com/firebasejs/10.13.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.13.1/firebase-auth-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.13.1/firebase-firestore-compat.js"></script>

    <style>
        /* Tipografía y Fondo Limpio */
        body { 
            font-family: 'Inter', system-ui, -apple-system, sans-serif; 
            background-color: #f8fafc; /* Slate 50 */
            color: #1e293b; /* Slate 800 */
            user-select: none; 
        }
        
        .no-scrollbar::-webkit-scrollbar { display: none; }
        .no-scrollbar { -ms-overflow-style: none; scrollbar-width: none; }
        
        @media print {
            body * { visibility: hidden; }
            #receipt-area, #receipt-area * { visibility: visible; }
            #receipt-area { position: absolute; left: 0; top: 0; width: 100%; margin: 0; padding: 0; background: white; color: black; }
            @page { margin: 0; size: auto; }
        }
        
        /* ESTILOS DE BOTONES DE OPCIONES */
        .option-btn { @apply border-2 rounded-xl p-2 text-center cursor-pointer transition-all font-bold text-slate-500 bg-white border-slate-200 text-sm; }
        .option-btn.clara.selected { background-color: #fef08a; border-color: #eab308; color: #854d0e; }
        .option-btn.oscura.selected { background-color: #1e293b; border-color: #0f172a; color: #f8fafc; }
        
        .prep-radio { @apply border-2 rounded-xl p-2 text-center cursor-pointer transition-all font-medium text-slate-500 bg-white border-slate-200 text-xs; }
        .prep-radio.selected { background-color: #bfdbfe; border-color: #3b82f6; color: #1e3a8a; font-weight: 800; }

        .mod-btn { transition: all 0.2s; border-width: 2px; font-weight: 600; border-style: solid; }
        .mod-btn.btn-red { color: #ef4444; background-color: #fef2f2; border-color: #fecaca; }
        .mod-btn.btn-red.selected { background-color: #ef4444; color: white; border-color: #dc2626; }
        .mod-btn.btn-green { color: #22c55e; background-color: #f0fdf4; border-color: #bbf7d0; }
        .mod-btn.btn-green.selected { background-color: #22c55e; color: white; border-color: #16a34a; }
        .mod-btn.btn-neutral { color: #64748b; background-color: #f8fafc; border-color: #cbd5e1; }
        .mod-btn.btn-neutral.selected { background-color: #64748b; color: white; border-color: #475569; }
        
        .cat-header { font-size: 0.85rem; font-weight: 800; text-transform: uppercase; color: #64748b; margin-top: 1.5rem; margin-bottom: 0.5rem; letter-spacing: 0.05em; border-bottom: 2px solid #e2e8f0; padding-bottom: 4px; }

        /* Estilo para secciones de paquete */
        .pkg-section { @apply mb-4 border border-slate-200 rounded-xl p-3 bg-white shadow-sm; }
        .pkg-title { @apply font-bold text-slate-700 mb-2 border-b border-slate-100 pb-1 text-sm uppercase; }
        
        /* Animación para el botón de cobro rápido */
        .fast-add-btn:active { transform: scale(0.95); background-color: #dcfce7; border-color: #22c55e; }
        @keyframes pop { 0% { transform: scale(1); } 50% { transform: scale(1.3); } 100% { transform: scale(1); } }
        .pop-anim { animation: pop 0.2s ease-in-out; }

        /* Estilos generales limpios */
        input, select {
            @apply border-2 border-slate-200 p-3 rounded-xl text-lg font-bold outline-none bg-white text-slate-800 transition-colors focus:border-blue-500;
        }
    </style>
</head>
<body>

    <div id="app" class="h-screen w-full flex flex-col overflow-hidden relative font-sans">
        <!-- Header Moderno -->
        <header id="main-header" class="bg-slate-900 text-white p-4 shadow-lg flex justify-between items-center z-10 shrink-0 relative">
            <div class="flex items-center gap-3">
                <div class="bg-white p-1 rounded-full border-2 border-slate-200 overflow-hidden w-12 h-12 flex items-center justify-center shadow-sm">
                    <img src="https://www.dropbox.com/scl/fi/htapbd4yf4m239y9zv2n1/Picture1.png?rlkey=o8je5uxe95avc9i9od6dmpbqh&raw=1" alt="Logo" class="w-full h-full object-contain" onerror="this.src='https://placehold.co/100x100?text=AB'">
                </div>
                <h1 class="font-bold text-xl tracking-tight" id="header-title">A-LAS DE BARRIL</h1>
            </div>
            <div id="status-indicator" class="hidden absolute left-1/2 transform -translate-x-1/2 px-4 py-1.5 rounded-full bg-red-500 border border-red-600 text-xs font-bold shadow-lg animate-pulse flex items-center gap-2 top-16 md:top-auto text-white">
                <span id="status-text"></span>
            </div>
            <div class="flex gap-2">
                <button onclick="window.toggleFullScreen()" class="w-9 h-9 bg-slate-700 border border-slate-600 rounded-lg hover:bg-slate-600 transition flex items-center justify-center text-slate-200 shadow-sm" title="Pantalla Completa">
                    <i class="fa-solid fa-expand"></i>
                </button>
                <button onclick="window.logoutToHome()" class="text-xs bg-slate-800 border border-slate-700 px-3 py-2 rounded-lg hover:bg-slate-700 transition font-bold text-slate-200 flex items-center gap-2 shadow-sm">
                    <i class="fa-solid fa-right-from-bracket"></i> Salir
                </button>
            </div>
        </header>

        <!-- Contenido -->
        <main id="content-area" class="flex-1 overflow-y-auto bg-slate-50 relative flex flex-col p-2">
            <div class="flex flex-col justify-center items-center h-full text-slate-400 opacity-70 gap-4">
                <i class="fa-solid fa-circle-notch fa-spin text-5xl text-blue-500"></i>
                <p class="text-sm font-bold animate-pulse">Cargando sistema...</p>
            </div>
        </main>

        <div id="receipt-area" class="hidden bg-white p-4 text-xs w-[300px] mx-auto font-mono text-black"></div>
    </div>

    <!-- Modales -->
    <div id="modal-overlay" class="fixed inset-0 bg-slate-900 bg-opacity-60 hidden z-50 flex justify-center items-center p-4 backdrop-blur-sm">
        <div id="modal-content" class="bg-white rounded-2xl shadow-2xl w-full max-w-md overflow-hidden max-h-[90vh] flex flex-col"></div>
    </div>

    <script>
        // ==========================================
        // FUNCION PANTALLA COMPLETA
        // ==========================================
        window.toggleFullScreen = function() {
            if (!document.fullscreenElement && !document.mozFullScreenElement && !document.webkitFullscreenElement) {
                if (document.documentElement.requestFullscreen) {
                    document.documentElement.requestFullscreen();
                } else if (document.documentElement.mozRequestFullScreen) {
                    document.documentElement.mozRequestFullScreen();
                } else if (document.documentElement.webkitRequestFullscreen) {
                    document.documentElement.webkitRequestFullscreen(Element.ALLOW_KEYBOARD_INPUT);
                }
            } else {
                if (document.cancelFullScreen) {
                    document.cancelFullScreen();
                } else if (document.mozCancelFullScreen) {
                    document.mozCancelFullScreen();
                } else if (document.webkitCancelFullScreen) {
                    document.webkitCancelFullScreen();
                }
            }
        }

        // ==========================================
        // 0. DETECTOR DE ERRORES VISUAL 
        // ==========================================
        window.onerror = function(message, source, lineno, colno, error) {
            document.getElementById('content-area').innerHTML = `
                <div class="flex flex-col justify-center items-center h-full p-6 text-center bg-red-50">
                    <h2 class="font-bold text-2xl text-red-600 mb-4"><i class="fa-solid fa-triangle-exclamation"></i> Error Detectado</h2>
                    <p class="text-slate-700 text-sm font-bold mb-2">${message}</p>
                    <p class="text-slate-500 font-mono text-xs">Línea: ${lineno}</p>
                </div>`;
            return false;
        };

        // ==========================================
        // 1. VARIABLES GLOBALES Y MAESTROS
        // ==========================================
        const firebaseConfig = {
            apiKey: "AIzaSyBqrR3FQ7L7KCE5Wg8thRvyA6GpiUV2DPs",
            authDomain: "alasdebarrilwings.firebaseapp.com",
            projectId: "alasdebarrilwings",
            storageBucket: "alasdebarrilwings.firebasestorage.app",
            messagingSenderId: "826542576836",
            appId: "1:826542576836:web:dd1bc6f8bc4fd73d57a591"
        };

        let app, auth, db;
        let currentUser = null, ordersData = [], tablesData = [];
        let currentRole = null, currentTableId = null, showingDebts = false;
        let isCobrarMode = false; 
        let currentTab = 'menu';
        let localFastOrders = {};
        let scrollPositions = { menu: 0, orders: 0 };
        let appInitialized = false;

        // DATOS MAESTROS
        let MENU = [];
        let MASTER_INVENTORY = [];
        let currentAdminTab = 'inventory'; 

        const MODIFIERS = {
            burgers: ["Sin cebolla", "Sin jitomate", "Sin piña", "Sin picante", "Sin catsup", "Sin mayonesa", "Sin queso", "Sin jamón", "Sin carne"],
            hotdogs: ["Sin jitomate", "Sin cebolla", "Sin piña", "Sin picante", "Sin catsup", "Sin mayonesa", "Sin salchicha", "Sin tocino"],
            salsas: ["Bbq", "Mango", "Habanero", "Tamarindo", "Jamaica", "Frutos rojos", "Piña", "Chipotle", "Búfalo", "Lemon pepper", "A la diabla"],
            snacks: ["Sin queso", "Sin crema", "Sin catsup", "Sin salsa", "Sin vegetales"],
            sodas: ["Coca", "Boing Mango", "Boing Guayaba", "Manzanita", "Jarrito", "Squirt"],
            coolers: ["Durazno", "Fresa", "Vino", "Manzana Kiwi"],
            general_kitchen: ["Para llevar", "Sin cubiertos"],
            general_bar: ["Poca azúcar", "Sin popote"],
            package_options: ["Con Papas", "Con Aros de Cebolla", "Con Alitas", "Con Boneless", "Salsa BBQ", "Salsa Buffalo", "Salsa Mango", "Salsa Habanero"]
        };

        // ==========================================
        // 2. DEFINICIÓN DE TODAS LAS FUNCIONES
        // ==========================================
        window.updateStatusDisplay = function() {
            const ind = document.getElementById('status-indicator');
            const txt = document.getElementById('status-text');
            if (!navigator.onLine) {
                ind.classList.remove('hidden'); txt.innerHTML = '<i class="fa-solid fa-wifi"></i> MODO OFFLINE';
            } else { ind.classList.add('hidden'); }
        }

        window.showError = function(title, details) { 
            document.getElementById('content-area').innerHTML = `<div class="flex flex-col justify-center items-center h-full p-6 text-center"><h2 class="font-bold text-2xl text-red-600">${title}</h2><p class="text-slate-600 mt-2">${details}</p><button onclick="location.reload()" class="mt-6 bg-slate-800 text-white rounded-lg px-6 py-2 shadow">Reintentar</button></div>`; 
        }

        window.refreshCurrentView = function() {
            if(!currentRole) return;
            if(currentRole === 'waiter') currentTableId ? window.renderTableDetail(currentTableId) : window.renderWaiterDashboard();
            else if(currentRole === 'kitchen') window.renderBoard('kitchen');
            else if(currentRole === 'bar') window.renderBoard('bar');
            else if(currentRole === 'admin') window.renderAdminDashboard();
        }

        window.renderHome = function() {
            currentRole = null;
            document.getElementById('header-title').innerText = 'A-LAS DE BARRIL';
            document.getElementById('content-area').innerHTML = `
                <div class="p-6 flex flex-col gap-5 h-full justify-center items-center max-w-md mx-auto relative">
                    <img src="https://www.dropbox.com/scl/fi/jymn0kvgyx9ioqjojwbfw/Picture2.png?rlkey=u4k3ppl3f7vohb07au7bt8tw4&raw=1" class="w-48 rounded-3xl shadow-md mb-2" alt="Logo" onerror="this.src='https://placehold.co/200x200?text=LOGO'">
                    <h2 class="text-2xl font-black text-slate-800 mb-4 pb-2 border-b-2 border-slate-200 tracking-tight">Selecciona Perfil</h2>
                    <button onclick="window.setRole('waiter')" class="w-full bg-blue-600 hover:bg-blue-700 text-white rounded-2xl p-5 text-xl font-bold flex gap-4 items-center shadow-lg transition transform active:scale-95"><div class="bg-blue-800/30 p-3 rounded-xl"><i class="fa-solid fa-mobile-screen"></i></div><span>Mesero</span></button>
                    <button onclick="window.setRole('bar')" class="w-full bg-amber-500 hover:bg-amber-600 text-white rounded-2xl p-5 text-xl font-bold flex gap-4 items-center shadow-lg transition transform active:scale-95"><div class="bg-amber-700/30 p-3 rounded-xl"><i class="fa-solid fa-beer-mug-empty"></i></div><span>Barra</span></button>
                    <button onclick="window.setRole('kitchen')" class="w-full bg-red-500 hover:bg-red-600 text-white rounded-2xl p-5 text-xl font-bold flex gap-4 items-center shadow-lg transition transform active:scale-95"><div class="bg-red-700/30 p-3 rounded-xl"><i class="fa-solid fa-fire-burner"></i></div><span>Cocina</span></button>
                    
                    <!-- Botón Admin Oculto pero accesible -->
                    <button onclick="window.promptAdminPin()" class="mt-8 text-slate-400 font-bold hover:text-slate-600 transition flex items-center gap-2 text-sm"><i class="fa-solid fa-lock"></i> Panel de Administración</button>
                </div>`;
        }
        
        window.setRole = function(r) { currentRole = r; window.refreshCurrentView(); }

        // ==========================================
        // FUNCIONES DE ADMINISTRADOR Y PIN
        // ==========================================
        window.promptAdminPin = function() {
            document.getElementById('modal-content').innerHTML = `
                <div class="p-6 text-center bg-white relative">
                    <button onclick="window.closeModal()" class="absolute top-4 right-4 text-slate-400 text-xl hover:text-red-500 transition bg-slate-100 rounded-full w-8 h-8 flex items-center justify-center"><i class="fa-solid fa-times"></i></button>
                    <div class="bg-slate-100 w-16 h-16 rounded-full flex items-center justify-center mx-auto mb-4 text-slate-600 text-2xl"><i class="fa-solid fa-shield-halved"></i></div>
                    <h3 class="font-black text-2xl mb-6 text-slate-800">Acceso Admin</h3>
                    <input type="password" id="admin-pin-input" placeholder="******" maxlength="6" class="w-full text-center text-4xl tracking-[0.5em] p-4 border-2 border-slate-200 rounded-2xl mb-6 focus:border-blue-500 outline-none bg-slate-50 text-slate-800">
                    <button onclick="window.verifyPin()" class="w-full bg-slate-800 text-white font-black text-lg py-4 rounded-xl shadow-md hover:bg-slate-700 transition active:scale-95">INGRESAR</button>
                </div>`;
            document.getElementById('modal-overlay').classList.remove('hidden');
            setTimeout(() => document.getElementById('admin-pin-input').focus(), 100);
        }

        window.verifyPin = async function() {
            const input = document.getElementById('admin-pin-input').value;
            try {
                const docRef = await db.collection('config').doc('admin').get();
                let validPin = '123456';
                if (docRef.exists && docRef.data().pin) {
                    validPin = docRef.data().pin;
                } else {
                    await db.collection('config').doc('admin').set({ pin: '123456' });
                }

                if (input === validPin) {
                    window.closeModal();
                    window.setRole('admin');
                } else {
                    alert("PIN Incorrecto");
                    document.getElementById('admin-pin-input').value = '';
                }
            } catch (e) { alert("Error verificando PIN: " + e.message); }
        }

        window.openChangePinModal = function() {
            document.getElementById('modal-content').innerHTML = `
                <div class="p-6 bg-white relative">
                    <button onclick="window.closeModal()" class="absolute top-4 right-4 text-slate-400 text-xl hover:text-red-500 transition bg-slate-100 rounded-full w-8 h-8 flex items-center justify-center"><i class="fa-solid fa-times"></i></button>
                    <h3 class="font-black text-xl mb-4 text-slate-800 border-b border-slate-100 pb-3"><i class="fa-solid fa-key text-blue-500 mr-2"></i>Cambiar PIN de Acceso</h3>
                    <div class="space-y-4 mb-6">
                        <div>
                            <label class="text-xs font-bold text-slate-500 uppercase ml-1">Nuevo PIN (6 dígitos numéricos)</label>
                            <input type="password" id="new-pin" maxlength="6" placeholder="******" class="w-full text-center tracking-[0.5em] text-3xl p-4 bg-slate-50 border-2 border-slate-200 rounded-2xl focus:border-blue-500 outline-none mt-2">
                        </div>
                    </div>
                    <div class="flex gap-3">
                        <button onclick="window.closeModal()" class="flex-1 bg-slate-100 text-slate-600 font-bold rounded-xl py-4 hover:bg-slate-200 transition">Cancelar</button>
                        <button onclick="window.saveNewPin()" class="flex-1 bg-green-600 text-white font-bold rounded-xl py-4 shadow-md hover:bg-green-700 transition">Guardar PIN</button>
                    </div>
                </div>`;
            document.getElementById('modal-overlay').classList.remove('hidden');
        }

        window.saveNewPin = async function() {
            const newPin = document.getElementById('new-pin').value;
            if (newPin.length < 4) return alert("El PIN debe tener al menos 4 dígitos.");
            try {
                await db.collection('config').doc('admin').set({ pin: newPin }, { merge: true });
                alert("PIN actualizado con éxito.");
                window.closeModal();
            } catch(e) { alert("Error: " + e.message); }
        }

        // ==========================================
        // VISTAS SEPARADAS DE ADMIN (INVENTARIO VS MENÚ)
        // ==========================================
        window.switchAdminMainTab = function(tab) {
            currentAdminTab = tab;
            window.renderAdminDashboard();
        }

        window.renderAdminDashboard = function() {
            currentTableId = null;
            document.getElementById('header-title').innerText = 'Panel de Administración';

            const activeClass = "bg-blue-600 text-white shadow-md border border-blue-700";
            const inactiveClass = "bg-white text-slate-600 border border-slate-300 hover:bg-slate-50 transition";

            let contentHtml = '';

            if (currentAdminTab === 'inventory') {
                contentHtml = `
                    <div class="bg-white rounded-2xl shadow-sm border border-slate-200 overflow-hidden overflow-x-auto mb-4">
                        <table class="w-full text-left border-collapse min-w-[600px]">
                            <thead class="bg-slate-50 text-slate-500 text-xs uppercase font-bold border-b border-slate-200">
                                <tr>
                                    <th class="p-4">Insumo Maestro</th>
                                    <th class="p-4 text-center">Stock Real Disponible</th>
                                    <th class="p-4 text-center w-48">Acción</th>
                                </tr>
                            </thead>
                            <tbody class="divide-y divide-slate-100 text-sm">
                                ${MASTER_INVENTORY.map(inv => `
                                    <tr class="hover:bg-slate-50 transition">
                                        <td class="p-4">
                                            <div class="font-bold text-slate-800 text-base">${inv.name}</div>
                                            <div class="text-[10px] text-slate-400 font-mono mt-1">ID: ${inv.id}</div>
                                        </td>
                                        <td class="p-4 text-center">
                                            <span class="font-black text-2xl ${inv.stock > 10 ? 'text-green-600' : (inv.stock > 0 ? 'text-amber-500' : 'text-red-500')}">
                                                ${inv.stock}
                                            </span>
                                        </td>
                                        <td class="p-4 text-center">
                                            <button onclick="window.openEditMasterInvModal('${inv.id}')" class="bg-amber-50 border border-amber-200 text-amber-700 px-4 py-2.5 rounded-xl font-bold hover:bg-amber-500 hover:text-white transition shadow-sm active:scale-95 flex items-center justify-center w-full gap-2"><i class="fa-solid fa-boxes-stacked"></i> Ajustar</button>
                                        </td>
                                    </tr>
                                `).join('')}
                            </tbody>
                        </table>
                    </div>
                    <button onclick="window.openAddMasterInvModal()" class="w-full bg-green-50 text-green-600 border border-green-200 border-dashed rounded-xl py-4 font-bold hover:bg-green-500 hover:text-white transition flex items-center justify-center gap-2 shadow-sm"><i class="fa-solid fa-plus"></i> Agregar Nuevo Insumo Maestro</button>
                `;
            } else {
                contentHtml = `
                    <div class="bg-white rounded-2xl shadow-sm border border-slate-200 overflow-hidden overflow-x-auto mb-4">
                        <table class="w-full text-left border-collapse min-w-[900px]">
                            <thead class="bg-slate-50 text-slate-500 text-xs uppercase font-bold border-b border-slate-200">
                                <tr>
                                    <th class="p-4">Producto del Menú</th>
                                    <th class="p-4">Precio Público</th>
                                    <th class="p-4 text-center">Receta (Consume)</th>
                                    <th class="p-4 text-center">Órdenes Vendidas</th>
                                    <th class="p-4 text-center w-48">Acción</th>
                                </tr>
                            </thead>
                            <tbody class="divide-y divide-slate-100 text-sm">
                                ${MENU.map(item => {
                                    const masterInv = MASTER_INVENTORY.find(inv => inv.id === item.invId) || { name: 'Sin Insumo vinculado', stock: 0 };
                                    return `
                                    <tr class="hover:bg-slate-50 transition">
                                        <td class="p-4">
                                            <div class="font-bold text-slate-700 text-base">${item.name}</div>
                                            <span class="text-[10px] uppercase font-bold text-slate-400 tracking-wider">${item.category}</span>
                                        </td>
                                        <td class="p-4 text-blue-600 font-black text-lg">$${item.price}</td>
                                        <td class="p-4 text-center">
                                            <div class="font-bold text-slate-600">${item.invCost || 0} de:</div>
                                            <div class="text-xs text-slate-400 mt-1 truncate max-w-[200px] mx-auto">${masterInv.name}</div>
                                        </td>
                                        <td class="p-4 text-slate-500 font-bold text-center text-base">${item.sold_since_update || 0}</td>
                                        <td class="p-4 text-center">
                                            <button onclick="window.openEditMenuItemModal('${item.id}')" class="bg-blue-50 border border-blue-100 text-blue-600 px-4 py-2.5 rounded-xl font-bold hover:bg-blue-600 hover:text-white transition shadow-sm active:scale-95 flex items-center justify-center w-full gap-2"><i class="fa-solid fa-pen-to-square"></i> Modificar</button>
                                        </td>
                                    </tr>
                                `}).join('')}
                            </tbody>
                        </table>
                    </div>
                    <button onclick="window.openAddMenuItemModal()" class="w-full bg-blue-50 text-blue-600 border border-blue-200 border-dashed rounded-xl py-4 font-bold hover:bg-blue-600 hover:text-white transition flex items-center justify-center gap-2 shadow-sm"><i class="fa-solid fa-plus"></i> Agregar Nuevo Producto al Menú</button>
                `;
            }

            let html = `
                <div class="p-4 md:p-8 max-w-6xl mx-auto pb-24">
                    <div class="flex justify-between items-center mb-6">
                        <div>
                            <h2 class="text-2xl font-black text-slate-800">Panel de Administración</h2>
                            <p class="text-sm text-slate-500 font-medium">Gestiona el almacén y el punto de venta por separado.</p>
                        </div>
                        <button onclick="window.openChangePinModal()" class="bg-white border border-slate-200 text-slate-600 px-4 py-2.5 rounded-xl font-bold hover:bg-slate-50 hover:text-blue-600 transition text-sm shadow-sm flex items-center gap-2"><i class="fa-solid fa-key"></i> Cambiar PIN</button>
                    </div>

                    <!-- Botones de Navegación Admin -->

        window.renderWaiterDashboard = function() {
            if (Object.keys(localFastOrders).length > 0) {
                if (!confirm("Tienes artículos en Cobro Rápido sin guardar. ¿Deseas salir y descartarlos?")) return;
            }
            localFastOrders = {}; 
            currentTableId = null;
            isCobrarMode = false; 
            currentTab = 'menu';
            scrollPositions = { menu: 0, orders: 0 };

            document.getElementById('header-title').innerText = 'Control de Mesas';
            const now = Date.now();
            const eightDaysMs = 8 * 24 * 60 * 60 * 1000;
            const openTables = tablesData.filter(t => t.status === 'open').sort((a,b) => (b.openedAt?.seconds||0) - (a.openedAt?.seconds||0));
            const debtTables = tablesData.filter(t => t.status === 'debt').sort((a,b) => (b.debtDate?.seconds||0) - (a.debtDate?.seconds||0));
            const closedTables = tablesData.filter(t => {
                if (t.status !== 'closed') return false;
                const closedDate = t.closedAt?.seconds * 1000 || 0;
                return (now - closedDate) < eightDaysMs;
            }).sort((a,b) => (b.closedAt?.seconds||0) - (a.closedAt?.seconds||0));
            
            const btnClass = showingDebts ? 'bg-red-500 hover:bg-red-600 text-white' : 'bg-slate-700 hover:bg-slate-800 text-white';
            const sectionTitle = showingDebts ? 'Deudas Pendientes' : 'Mesas Abiertas';

                            ${showingDebts && debtTables.length === 0 ? '<p class="col-span-2 text-slate-400 text-sm text-center italic py-6 bg-white rounded-xl border border-dashed border-slate-300">No hay deudas</p>' : ''}

                        </div>

                </div>`;
            document.getElementById('content-area').innerHTML = html;
        }

        window.createTableCard = function(t) {
            const ords = ordersData.filter(o => o.tableId === t.id && o.status !== 'cancelled');
            const total = ords.reduce((a,c) => a + (c.price * c.quantity), 0);
            const deposit = t.deposit || 0;
            const remaining = total - deposit;
            let cardBgClass = 'bg-white', borderColor = 'border-slate-200', badge = '', statusIconColor = 'text-slate-500';
            
            if (t.isVip) { cardBgClass = 'bg-pink-50'; borderColor = 'border-pink-200'; }
            if (t.status === 'open') {
                const pending = ords.some(o => o.status !== 'delivered');
                borderColor = pending ? 'border-amber-400' : 'border-green-500';
                statusIconColor = pending ? 'text-amber-500' : 'text-green-500';
                badge = pending ? `<i class="fa-solid fa-clock animate-pulse ${statusIconColor}"></i>` : `<i class="fa-solid fa-check ${statusIconColor}"></i>`;
            } else if (t.status === 'debt') { borderColor = 'border-red-400'; cardBgClass = 'bg-red-50'; statusIconColor = 'text-red-500'; badge = `<i class="fa-solid fa-file-invoice-dollar ${statusIconColor}"></i>`;
            } else { cardBgClass = 'bg-slate-100'; statusIconColor = 'text-slate-400'; badge = `<i class="fa-solid fa-lock ${statusIconColor}"></i>`; }
            
            let vipBadge = t.isVip ? `<span class="absolute -top-3 -left-3 bg-pink-500 text-white text-[10px] px-3 py-1 rounded-full font-bold shadow-md border-2 border-white"><i class="fa-solid fa-crown"></i> VIP</span>` : '';
            let priceDisplay = `$${total}`; if (deposit > 0) priceDisplay = `<span class="text-xs text-red-500 line-through mr-1 font-mono">$${total}</span> $${remaining}`;
            const dateStr = t.openedAt ? new Date(t.openedAt.seconds * 1000).toLocaleString('es-MX', { day: '2-digit', month: '2-digit', hour: '2-digit', minute: '2-digit', hour12: false }).replace(',', '') : '';

            return `<div onclick="window.renderTableDetail('${t.id}')" class="rounded-xl shadow-sm p-4 border-2 ${cardBgClass} ${borderColor} relative cursor-pointer hover:shadow-md active:scale-95 transition-all">
                    ${vipBadge}
                    <div class="flex justify-between items-start mb-2">
                        <span class="text-[10px] font-mono font-bold text-slate-500 bg-slate-200/50 px-2 py-1 rounded-md">#${t.uniqueId || '---'}</span>
                        <div class="flex flex-col items-end">
                             <span class="text-[10px] text-slate-400 font-mono mb-1 font-bold">${dateStr}</span>
                             <div class="bg-white rounded-full p-1.5 shadow-sm">${badge}</div>
                        </div>
                    </div>
                    <div class="text-2xl font-black text-slate-800 leading-tight mb-1 text-center truncate">${t.nickname}</div>
                    <div class="text-xs text-slate-500 font-bold mb-3 uppercase tracking-wider text-center border-b border-dashed border-slate-200 pb-2">Mesa ${t.number}</div>
                    <div class="text-xl font-bold text-blue-600 text-right">${priceDisplay}</div>
                </div>`;
        }

        window.toggleDebtView = function() { showingDebts = !showingDebts; window.renderWaiterDashboard(); }
        window.searchTicket = async function() { const id=parseInt(document.getElementById('search-ticket-id').value); if(!id)return; const found=tablesData.find(t=>t.uniqueId===id); if(found)window.renderTableDetail(found.id); else alert("No encontrado"); }

            event.stopPropagation(); 
            if (currentQty > 1) {
                window.openDeleteQuantityModal(orderId, currentQty, itemName);
            } else {
                if(confirm(`¿Borrar "${itemName}" de la cuenta?`)) {
                    await window.confirmDelete(orderId, currentQty, 1);
                }
            }
        }

        window.openDeleteQuantityModal = function(orderId, currentQty, itemName) {
             document.getElementById('modal-content').innerHTML = `
                <div class="p-6 text-center bg-white relative">
                    <h3 class="font-black text-xl mb-4 text-slate-800 border-b border-slate-100 pb-3">Borrar Artículo</h3>
                    <p class="mb-2 text-slate-600 text-sm">Hay <strong>${currentQty}</strong> ordenados de:<br><span class="text-slate-800 font-bold text-lg">${itemName}</span></p>
                    <p class="mb-4 text-slate-400 text-xs font-bold uppercase tracking-wider">¿Cuántos eliminar?</p>
                    
                    <div class="flex justify-center items-center gap-6 mb-6 bg-slate-50 p-4 rounded-xl border border-slate-200">
                         <button onclick="window.adjDelQty(-1)" class="w-14 h-14 rounded-full bg-white text-slate-600 font-bold text-2xl border border-slate-200 shadow-sm active:scale-95 transition">-</button>
                         <span id="del-qty-val" class="text-4xl font-black text-red-500 w-12 text-center">1</span>
                         <button onclick="window.adjDelQty(1, ${currentQty})" class="w-14 h-14 rounded-full bg-red-500 text-white font-bold text-2xl shadow-md hover:bg-red-600 active:scale-95 transition">+</button>
                    </div>

                    <div class="flex gap-3">
                        <button onclick="window.closeModal()" class="flex-1 bg-slate-100 text-slate-600 font-bold py-4 rounded-xl hover:bg-slate-200 transition">Cancelar</button>
                        <button onclick="window.confirmDeleteFromModal('${orderId}', ${currentQty})" class="flex-1 bg-red-500 text-white font-bold py-4 rounded-xl shadow-md hover:bg-red-600 transition">Confirmar</button>
                    </div>
                </div>`;
            document.getElementById('modal-overlay').classList.remove('hidden');
        }

        window.adjDelQty = function(delta, max) {
            const el = document.getElementById('del-qty-val');
            let val = parseInt(el.innerText) + delta;
            if (val < 1) val = 1;
            if (max && val > max) val = max;
            el.innerText = val;
        }

        window.confirmDeleteFromModal = async function(orderId, currentQty) {
            const qtyToDelete = parseInt(document.getElementById('del-qty-val').innerText);
            await window.confirmDelete(orderId, currentQty, qtyToDelete);
            window.closeModal();
        }

        window.confirmDelete = async function(orderId, currentQty, qtyToDelete) {
            try {
                const docSnap = await db.collection('orders').doc(orderId).get();
                if(docSnap.exists) {
                    const orderData = docSnap.data();
                    const itemId = orderData.itemId;
                    
                    if (qtyToDelete >= currentQty) {
                        await db.collection('orders').doc(orderId).delete();
                    } else {
                        await db.collection('orders').doc(orderId).update({ quantity: currentQty - qtyToDelete });
                    }

                    if(itemId) {
                        const menuItem = MENU.find(m => m.id === itemId);
                        if (menuItem) {
                            const totalToReturn = qtyToDelete * (menuItem.invCost || 1);
                            db.collection('menu_items').doc(itemId).update({
                                sold_since_update: firebase.firestore.FieldValue.increment(-qtyToDelete)
                            }).catch(e=>console.warn(e));

                            if (menuItem.invId) {
                                db.collection('inventory').doc(menuItem.invId).update({
                                    stock: firebase.firestore.FieldValue.increment(totalToReturn)
                                }).catch(e=>console.warn(e));
                            }
                        }
                    }
                }
            } catch(e) { alert("Error al borrar: " + e.message); }
        }

        window.setCobrarMode = function(isCobrar) {
            if (Object.keys(localFastOrders).length > 0 && !isCobrar) {
                if (!confirm("Tienes artículos sin agregar. ¿Deseas descartarlos al salir del modo Rápido?")) return;
            }
            localFastOrders = {};
            isCobrarMode = isCobrar;
            scrollPositions.menu = 0;
            window.renderTableDetail(currentTableId);
        }

        window.getFastMenuGroups = function() {
            let items = [];
            MENU.forEach(item => {
                items.push({ ...item, displayName: item.name, finalPrice: item.price, extraName: '', extraPrice: 0 });
                if (item.isBeer) {
                    items.push({ 
                        ...item, 
                        displayName: `${item.name} + Clamato`, 
                        finalPrice: item.price + 5, 
                        extraName: '+ Clamato', 
                        extraPrice: 5 
                    });
                }
            });

            let groups = {};
            items.forEach(i => {
                if (!groups[i.finalPrice]) groups[i.finalPrice] = [];
                groups[i.finalPrice].push(i);
            });
            return groups;
        }

        window.renderFastMenu = function() {
            const groups = window.getFastMenuGroups();
            const sortedPrices = Object.keys(groups).map(Number).sort((a,b) => a - b);
            
            return sortedPrices.map(price => {
                const items = groups[price];
                const buttons = items.map(i => {
                    const safeKey = (i.id + (i.extraName || '')).replace(/[^a-zA-Z0-9]/g, '');
                    const localQty = localFastOrders[safeKey] ? localFastOrders[safeKey].quantity : 0;
                    const hiddenClass = localQty > 0 ? '' : 'hidden';

                    return `
                    <div class="flex h-16 rounded-xl shadow-sm border border-slate-200 bg-white hover:border-blue-300 transition-colors relative">
                        <button onclick="window.fastRemoveOrder('${i.id}', '${i.extraName}')" class="w-1/4 bg-red-50 hover:bg-red-100 text-red-500 border-r border-slate-100 flex items-center justify-center active:bg-red-200 transition-colors rounded-l-xl">
                            <i class="fa-solid fa-minus"></i>
                        </button>
                        <button onclick="window.fastAddOrder('${i.id}', '${i.extraName}', ${i.extraPrice})" class="w-3/4 flex flex-col items-center justify-center relative active:bg-green-50 transition-colors p-2 rounded-r-xl">
                            <div id="badge-${safeKey}" class="absolute -top-2 -right-2 bg-blue-500 text-white text-[11px] font-black w-6 h-6 rounded-full flex items-center justify-center shadow-md ${hiddenClass} z-20 transform transition-transform border-2 border-white">${localQty}</div>
                            <span class="text-[11px] font-bold text-slate-700 leading-tight text-center relative z-10">${i.displayName}</span>
                        </button>
                    </div>
                    `;
                }).join('');
                
                return `
                    <div class="mb-5 bg-white p-4 rounded-2xl border border-slate-200 shadow-sm">
                        <h4 class="font-black text-slate-800 border-b border-slate-100 mb-3 pb-2 flex justify-between items-center text-lg">
                            <span>$${price}</span>
                            <span class="text-xs text-slate-400 font-normal bg-slate-100 px-2 py-1 rounded-md">${items.length} items</span>
                        </h4>
                        <div class="grid grid-cols-2 gap-3">
                            ${buttons}
                        </div>
                    </div>
                `;
            }).join('');
        }

        window.fastAddOrder = function(itemId, extraName, extraPrice) {
            const item = MENU.find(i => i.id === itemId);
            const finalName = extraName ? `${item.name} ${extraName}` : item.name;
            const finalPrice = item.price + extraPrice;
            const safeKey = (itemId + (extraName || '')).replace(/[^a-zA-Z0-9]/g, '');

            if (!localFastOrders[safeKey]) {
                localFastOrders[safeKey] = {
                    item: item, finalName: finalName, finalPrice: finalPrice,
                    quantity: 0, category: item.category
                };
            }
            
            localFastOrders[safeKey].quantity += 1;
            
            const badge = document.getElementById(`badge-${safeKey}`);
            if (badge) {
                badge.innerText = localFastOrders[safeKey].quantity;
                badge.classList.remove('hidden', 'pop-anim');
                void badge.offsetWidth;
                badge.classList.add('pop-anim');
            }
            window.updateFloatingFastAddButton();
        }

        window.fastRemoveOrder = function(itemId, extraName) {
            const safeKey = (itemId + (extraName || '')).replace(/[^a-zA-Z0-9]/g, '');
            if (localFastOrders[safeKey] && localFastOrders[safeKey].quantity > 0) {
                localFastOrders[safeKey].quantity -= 1;
                const badge = document.getElementById(`badge-${safeKey}`);
                if (badge) {
                    if (localFastOrders[safeKey].quantity > 0) {
                        badge.innerText = localFastOrders[safeKey].quantity;
                        badge.classList.remove('pop-anim');
                        void badge.offsetWidth; 
                        badge.classList.add('pop-anim');
                    } else {
                        badge.classList.add('hidden');
                        delete localFastOrders[safeKey];
                    }
                }
                window.updateFloatingFastAddButton();
            }
        }

        window.updateFloatingFastAddButton = function() {
            let total = 0; let count = 0;
            Object.values(localFastOrders).forEach(o => { total += o.finalPrice * o.quantity; count += o.quantity; });
            const btn = document.getElementById('floating-fast-add');
            if (btn) {
                if (count > 0) {
                    btn.innerHTML = `AGREGAR $${total} <span class="text-xs ml-2 bg-white text-green-600 px-2 py-0.5 rounded-full font-bold shadow-sm">${count}</span>`;
                    btn.classList.remove('hidden');
                } else { btn.classList.add('hidden'); }
            }
        }

        window.submitLocalFastOrders = async function() {
            const orders = Object.values(localFastOrders);
            if (orders.length === 0) return;

            const btn = document.getElementById('floating-fast-add');
            if(btn) btn.innerHTML = '<i class="fa-solid fa-spinner fa-spin"></i> GUARDANDO...';

            try {
                const promises = orders.map(o => window.addOrderToDb(o.item, o.finalPrice, o.quantity, ['Cobro rápido'], o.finalName, o.category, true, 'delivered'));
                
                await Promise.all(promises);
                localFastOrders = {}; 
                
                const statusTxt = document.getElementById('status-indicator');
                statusTxt.innerHTML = `<i class="fa-solid fa-check"></i> Guardado`;
                statusTxt.className = "absolute left-1/2 transform -translate-x-1/2 px-4 py-2 rounded-full shadow-lg flex items-center gap-2 top-16 md:top-auto bg-green-500 text-white z-[60] font-bold text-sm transition-opacity";
                statusTxt.classList.remove('hidden');
                setTimeout(() => { statusTxt.classList.add('hidden'); }, 2000);

                window.renderTableDetail(currentTableId);
            } catch (e) {
                alert("Error al guardar: " + e.message);
                window.updateFloatingFastAddButton();
            }
        }

                document.getElementById('tab-btn-orders').className = inactiveClass;

                document.getElementById('tab-orders')?.classList.remove('hidden'); 
                document.getElementById('order-footer')?.classList.remove('hidden');

        window.submitPackageOrder = async function(itemId) {
            const item = MENU.find(i => i.id === itemId);
            let kitchenMods = [];
            let barMods = [];

            const getRadio = (name) => document.querySelector(`input[name="${name}"]:checked`)?.value || 'Sin elección';
            const getChecks = (cls) => Array.from(document.querySelectorAll(`.${cls}:checked`)).map(c => c.value).join(', ');
            const getBeer = (n) => `T${n}: ${document.getElementById(`p_beer_type_${n}`).value}, ${document.getElementById(`p_beer_prep_${n}`).value}` + (document.getElementById(`p_beer_nolimon_${n}`).checked ? ' (Sin Limón)' : '');

            if(itemId === 'p1') {
                kitchenMods.push(`Alitas: ${getRadio('p1_salsa_alitas')}`);
                kitchenMods.push(`Boneless: ${getRadio('p1_salsa_boneless')}`);
                kitchenMods.push(`Guarnición: ${getRadio('p1_side')}`);
                barMods.push(getBeer(1));
                barMods.push(getBeer(2));
            } else if(itemId === 'p2') {
                kitchenMods.push(`Principal: ${getRadio('p2_main')} (${getRadio('p2_salsa_main')})`);
                kitchenMods.push(`Burg 1: ${getChecks('p2_h1_mod') || 'Sencilla'}`);
                kitchenMods.push(`Burg 2: ${getChecks('p2_h2_mod') || 'Sencilla'}`);
                kitchenMods.push(`Guarnición: ${getRadio('p2_side')} (${getChecks('p2_side_mod')})`);
                barMods.push(getBeer(1));
                barMods.push(getBeer(2));
            } else if(itemId === 'p3') {
                kitchenMods.push(`Alitas: ${getRadio('p3_salsa_alitas')}`);
                kitchenMods.push(`Boneless: ${getRadio('p3_salsa_boneless')}`);
                kitchenMods.push(`Aros: ${getChecks('p3_aros_mod')}`);
                kitchenMods.push(`3 HotDogs: ${getChecks('p3_hd_mod')}`);
                barMods.push(`3 Tarros: ${document.getElementById('p3_beer_type').value}, ${document.getElementById('p3_beer_prep').value}` + (document.getElementById('p3_beer_nolimon').checked ? ' (Sin Limón)' : ''));
            }

            // Para los paquetes, registramos y solo bajamos inventario con el primero
            await window.addOrderToDb(item, item.price, 1, kitchenMods, `${item.name} (Cocina)`, 'kitchen', true);
            await window.addOrderToDb(item, 0, 1, barMods, `${item.name} (Barra)`, 'bar', false); 
            
            window.closeModal();
            window.switchTab('orders');
        }

        window.selectRadio = function(el, groupId) { const group = document.getElementById(groupId); if(group) { group.querySelectorAll('.beer-radio, .prep-radio').forEach(d => d.classList.remove('selected')); el.classList.add('selected'); } }

        window.checkChamoy = function() { const sel = document.querySelector('#beer-prep-group .prep-radio.selected')?.dataset.val; const btn = document.getElementById('btn-sin-ajonjoli'); if (btn) { if(sel === 'Escarchado Chamoy') btn.classList.remove('hidden'); else { btn.classList.add('hidden'); btn.classList.remove('selected'); } } }

        window.submitBeerOrder = async function(itemId) {
            const item = MENU.find(i => i.id === itemId);
            const qty = parseInt(document.getElementById('modal-qty').innerText);
            let finalPrice = item.price;
            let mods = [];
            const typeEl = document.querySelector('#beer-type-group .option-btn.selected'); if(typeEl) mods.push(typeEl.dataset.val);
            const prepEl = document.querySelector('#beer-prep-group .prep-radio.selected'); if(prepEl) mods.push(prepEl.dataset.val);
            if(document.getElementById('btn-sin-limon').classList.contains('selected')) mods.push("Sin Limón");
            if(document.getElementById('btn-sin-ajonjoli') && document.getElementById('btn-sin-ajonjoli').classList.contains('selected')) mods.push("Sin Ajonjolí");
            if(document.getElementById('btn-clamato').classList.contains('selected')) { mods.push("Extra Clamato"); finalPrice += 5; }
            const note = document.getElementById('manual-note').value.trim(); if(note) mods.push(note);
            
            await window.addOrderToDb(item, finalPrice, qty, mods);
            window.closeModal();
            window.switchTab('orders');
        }

        window.submitGeneralOrder = async function(itemId) {
            const item = MENU.find(i => i.id === itemId);
            const qty = parseInt(document.getElementById('modal-qty').innerText);
            const mods = Array.from(document.querySelectorAll('.mod-btn.selected')).map(el => el.innerText);
            const note = document.getElementById('manual-note').value.trim();
            if(note) mods.push(note);
            
            await window.addOrderToDb(item, item.price, qty, mods);
            window.closeModal();
            window.switchTab('orders');
        }

        window.addOrderToDb = async function(item, price, qty, mods, forceName = null, forceCat = null, updateInv = true, customStatus = 'ordered') {
            try {
                await db.collection('orders').add({
                    tableId: currentTableId, 
                    itemId: item.id, 
                    itemName: forceName || item.name, 
                    category: forceCat || item.category,
                    price: price, 
                    quantity: qty, 
                    modifiers: mods, 
                    status: customStatus, 
                    timestamp: firebase.firestore.FieldValue.serverTimestamp()
                });
                
                if (updateInv && item.id) {
                    const totalDeduction = qty * (item.invCost || 1);

                    db.collection('menu_items').doc(item.id).update({
                        sold_since_update: firebase.firestore.FieldValue.increment(qty)
                    }).catch(e => console.warn("Error sold count:", e));

                    if (item.invId) {
                        db.collection('inventory').doc(item.invId).update({
                            stock: firebase.firestore.FieldValue.increment(-totalDeduction)
                        }).catch(e => console.warn("Error inv update:", e));
                    }
                }
            } catch(e) { alert("Error agregando orden: " + e.message); }
        }

        window.subNT = async function() {
            const num = document.getElementById('ntn').value;
            const nick = document.getElementById('ntnm').value || 'Cliente';
            const isVip = document.getElementById('ntvip').checked;
            if(!num) return;
            try {
                await db.runTransaction(async (transaction) => {
                    const counterRef = db.collection('config').doc('counters_tables');
                    const counterDoc = await transaction.get(counterRef);
                    let newId = 1000;
                    if (counterDoc.exists) newId = counterDoc.data().current + 1;
                    transaction.set(counterRef, { current: newId });
                    
                    const newTableRef = db.collection('tables').doc();
                    transaction.set(newTableRef, { number: num, nickname: nick, status: 'open', openedAt: firebase.firestore.FieldValue.serverTimestamp(), uniqueId: newId, isVip: isVip });
                });
                window.closeModal();
            } catch (e) { alert("Error al crear mesa."); console.error(e); }
        }

            const ready = ordersData.filter(o => o.category === cat && o.status === 'ready');
            let html = `<div class="flex h-full p-3 gap-4 overflow-x-auto bg-slate-100">`;
            html += `<div class="flex-1 min-w-[300px] bg-white rounded-2xl shadow-sm p-4 flex flex-col border-t-4 border-red-500"><h3 class="font-black text-slate-800 mb-4 text-lg flex items-center gap-2"><div class="w-3 h-3 rounded-full bg-red-500 animate-pulse"></div> Pendientes (${active.filter(o=>o.status==='ordered').length})</h3><div class="flex-1 overflow-y-auto space-y-3 pr-1">${active.filter(o=>o.status==='ordered').map(o=>window.card(o,'ordered')).join('')}</div></div>`;
            if(cat==='kitchen') html += `<div class="flex-1 min-w-[300px] bg-white rounded-2xl shadow-sm p-4 flex flex-col border-t-4 border-amber-400"><h3 class="font-black text-slate-800 mb-4 text-lg flex items-center gap-2"><div class="w-3 h-3 rounded-full bg-amber-400"></div> Cocinando (${active.filter(o=>o.status==='preparing').length})</h3><div class="flex-1 overflow-y-auto space-y-3 pr-1">${active.filter(o=>o.status==='preparing').map(o=>window.card(o,'preparing')).join('')}</div></div>`;
            html += `<div class="flex-1 min-w-[300px] bg-white rounded-2xl shadow-sm p-4 flex flex-col border-t-4 border-green-500"><h3 class="font-black text-slate-800 mb-4 text-lg flex items-center gap-2"><div class="w-3 h-3 rounded-full bg-green-500"></div> Listos (${ready.length})</h3><div class="flex-1 overflow-y-auto space-y-3 pr-1">${ready.map(o=>window.card(o,'ready')).join('')}</div></div>`;
            document.getElementById('content-area').innerHTML = html + `</div>`;
        }
        
        window.card = function(o,s) {
            const t = tablesData.find(x=>x.id===o.tableId);
            const timeAgo = Math.floor((new Date()-new Date(o.timestamp?.seconds*1000))/60000);
            let btnClass = "bg-slate-500", btnText = "Acción";
            if(s==='ordered') { if(o.category==='bar') { btnText="Terminar"; btnClass="bg-green-600 hover:bg-green-700"; } else { btnText="Cocinar"; btnClass="bg-amber-500 hover:bg-amber-600"; } }
            else if(s==='preparing') { btnText="Terminar"; btnClass="bg-green-600 hover:bg-green-700"; } 
            else { btnText="Entregar"; btnClass="bg-blue-600 hover:bg-blue-700"; }
            let nextSt = s==='ordered' ? (o.category==='bar'?'ready':'preparing') : (s==='preparing'?'ready':'delivered');
            
            const isVip = t?.isVip;
            const cardBg = isVip ? "bg-pink-50 border-pink-200" : "bg-white border-slate-200";
            const vipBadge = isVip ? '<span class="bg-pink-500 text-white text-[10px] px-2 py-0.5 rounded-full ml-2 shadow-sm"><i class="fa-solid fa-crown"></i> VIP</span>' : '';
            
            return `<div class="${cardBg} p-4 rounded-xl shadow-sm border"><div class="flex justify-between font-bold text-sm mb-3"><span class="bg-slate-800 text-white px-2 py-1 rounded-md flex items-center shadow-sm">MESA ${t?t.number:'?'}${vipBadge}</span><span class="text-xs font-bold text-slate-500 bg-white border border-slate-200 px-2 py-1 rounded-md flex items-center gap-1"><i class="fa-regular fa-clock"></i> ${timeAgo} min</span></div><div class="text-lg font-bold text-slate-800 leading-tight mb-2"><span class="text-blue-600 bg-blue-50 px-2 py-0.5 rounded-md mr-1">${o.quantity}x</span> ${o.itemName}</div>${o.modifiers&&o.modifiers.length?`<div class="text-xs text-red-600 font-bold bg-red-50 p-2 rounded-lg border border-red-100 mb-3 flex flex-col gap-1 items-start"><span>${o.modifiers.join(', ')}</span></div>`:''}<button onclick="window.upd('${o.id}','${nextSt}')" class="w-full ${btnClass} text-white py-3 rounded-xl font-bold shadow-md active:scale-95 transition uppercase tracking-wide">${btnText}</button></div>`;
        }
        
        window.upd = async function(id,s) { await db.collection('orders').doc(id).update({status:s}); }

        // ==========================================
        // 3. ARRANQUE DEL SISTEMA
        // ==========================================
        try {
            firebase.initializeApp(firebaseConfig); 
            auth = firebase.auth(); 
            db = firebase.firestore();
            
            db.enablePersistence({synchronizeTabs:true}).catch(err => console.warn("Offline persistence warn:", err.code));
            
            auth.onAuthStateChanged((user) => {
                if (user) {
                    currentUser = user;
                    
                    const handleDbError = (err) => {
                        console.error(err);
                        window.showError("Error de Base de Datos", "Revisa las 'Reglas' en Firebase.<br>Detalle: " + err.message);
                    };

                    // ESCUCHAR INVENTARIO MAESTRO
                    db.collection('inventory').onSnapshot(s => {
                        if (!s.empty) {
                            MASTER_INVENTORY = s.docs.map(d => ({id: d.id, ...d.data()}));
                            if (appInitialized) window.refreshCurrentView();
                        }
                    }, handleDbError);

                    // ESCUCHAR MENÚ EN TIEMPO REAL
                    db.collection('menu_items').onSnapshot(async (s) => {
                        if (!s.empty) {
                            // Leer y ordenar menú
                            MENU = s.docs.map(d => ({id: d.id, ...d.data()})).sort((a,b) => (a.order || 0) - (b.order || 0));
                            if (!appInitialized) {
                                appInitialized = true;
                                window.renderHome();
                            } else {
                                window.refreshCurrentView();
                            }
                        }
                    }, handleDbError);

                    const limitDate = new Date();
                    limitDate.setDate(limitDate.getDate() - 15);
                    const limitFb = firebase.firestore.Timestamp.fromDate(limitDate);

                    db.collection('tables').where('openedAt', '>=', limitFb).onSnapshot(s => { 
                        tablesData = s.docs.map(d=>({id:d.id, ...d.data()})); 
                        if(appInitialized) window.refreshCurrentView(); 
                    }, handleDbError);
                    
                    db.collection('orders').where('timestamp', '>=', limitFb).onSnapshot(s => { 
                        ordersData = s.docs.map(d=>({id:d.id, ...d.data()})); 
                        if(appInitialized) window.refreshCurrentView(); 
                    }, handleDbError);
                }
            });

            async function initApp() { 
                try { 
                    await auth.signInAnonymously(); 
                } catch (e) { 
                    window.showError("Error de Conexión", "Asegúrate de activar el inicio de sesión anónimo en Firebase.<br><br>" + e.message); 
                } 
            }
            initApp();

        } catch (e) { 
            window.showError("Error Crítico de Firebase", e.message); 
        }

    </script>
</body>
</html>
